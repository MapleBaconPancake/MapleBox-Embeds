<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Combined Live</title>
  <style>
    :root{
      --bg: #040b1f;
      --card: #07122b;
      --panel: #081630;
      --panel-2: #091936;
      --border: rgba(80, 145, 255, 0.22);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.82);

      --alert-none-bg: rgba(83, 125, 206, 0.10);
      --alert-none-border: rgba(110, 150, 230, 0.22);
      --alert-none-dot: #7ea6ff;

      --alert-watch-bg: rgba(255, 193, 77, 0.13);
      --alert-watch-border: rgba(255, 203, 97, 0.34);
      --alert-watch-dot: #ffd15d;

      --alert-warning-bg: rgba(255, 120, 90, 0.14);
      --alert-warning-border: rgba(255, 130, 100, 0.36);
      --alert-warning-dot: #ff8c6f;

      --aqhi-low-accent: #1499d3;
      --aqhi-low-bg-top: rgba(20, 153, 211, 0.16);
      --aqhi-low-bg-bottom: rgba(20, 153, 211, 0.08);
      --aqhi-low-border: rgba(20, 153, 211, 0.42);

      --aqhi-moderate-accent: #ffc323;
      --aqhi-moderate-bg-top: rgba(255, 195, 35, 0.18);
      --aqhi-moderate-bg-bottom: rgba(255, 195, 35, 0.08);
      --aqhi-moderate-border: rgba(255, 195, 35, 0.42);

      --aqhi-high-accent: #ff5b5b;
      --aqhi-high-bg-top: rgba(255, 91, 91, 0.18);
      --aqhi-high-bg-bottom: rgba(255, 91, 91, 0.08);
      --aqhi-high-border: rgba(255, 91, 91, 0.42);

      --aqhi-veryhigh-accent: #ad0000;
      --aqhi-veryhigh-bg-top: rgba(173, 0, 0, 0.18);
      --aqhi-veryhigh-bg-bottom: rgba(173, 0, 0, 0.08);
      --aqhi-veryhigh-border: rgba(173, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    body { padding: 0; }

    .card {
      width: 100%;
      height: 100vh;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        linear-gradient(180deg, #07122b, #040b1f);
      border: none;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 9px;
      overflow: hidden;
      contain: layout paint;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 10px;
      min-width: 0;
      align-items: start;
    }

    .left-top {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 4px;
      letter-spacing: 0.1px;
    }

    .updated {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.15;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero {
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding-bottom: 4px;
    }

    .hero-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .temp {
      font-size: 58px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -1.4px;
      margin: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .temp-icon-wrap {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .temp-icon-wrap img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
    }

    .status-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .condition {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .precip {
      font-size: 13px;
      line-height: 1.1;
      color: var(--muted);
      white-space: nowrap;
    }

    .feels, .high-low-inline {
      font-size: 14px;
      line-height: 1.15;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .right-top {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-self: stretch;
    }

    .descriptor-space {
      min-height: 116px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
      text-align: right;
      padding-top: 4px;
      background: transparent;
    }

    .descriptor-item {
      width: fit-content;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-width: 0;
      background: transparent;
      margin-left: auto;
    }

    .descriptor-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.12;
      width: auto;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .descriptor-sub {
      font-size: 11px;
      line-height: 1.18;
      color: var(--muted);
      width: auto;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .descriptor-sep {
      width: min(100%, 220px);
      height: 1px;
      background: rgba(120, 160, 255, 0.18);
      margin: 1px 0 2px;
      flex-shrink: 0;
    }

    .middle {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      grid-template-areas:
        "wind wind air air uv uv"
        "alerts alerts alerts alerts sunset humidity";
      gap: 8px;
      min-width: 0;
      min-height: 0;
      margin-top: 10px;
      align-items: stretch;
    }

    .slot-wind { grid-area: wind; }
    .slot-air { grid-area: air; }
    .slot-uv { grid-area: uv; }
    .slot-alerts { grid-area: alerts; min-width: 0; min-height: 0; }
    .slot-sunset { grid-area: sunset; }
    .slot-humidity { grid-area: humidity; }

    .stat {
      min-height: 60px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      overflow: hidden;
    }

    .stat.air-quality {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      color: var(--text);
    }

    .stat.air-quality.aqhi-low,
    .stat.uv-low {
      border-color: var(--aqhi-low-border);
      background:
        linear-gradient(180deg, var(--aqhi-low-bg-top), var(--aqhi-low-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-moderate,
    .stat.uv-moderate {
      border-color: var(--aqhi-moderate-border);
      background:
        linear-gradient(180deg, var(--aqhi-moderate-bg-top), var(--aqhi-moderate-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-high,
    .stat.uv-high {
      border-color: var(--aqhi-high-border);
      background:
        linear-gradient(180deg, var(--aqhi-high-bg-top), var(--aqhi-high-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-veryhigh,
    .stat.uv-veryhigh {
      border-color: var(--aqhi-veryhigh-border);
      background:
        linear-gradient(180deg, var(--aqhi-veryhigh-bg-top), var(--aqhi-veryhigh-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.wind-low {
      border-color: var(--aqhi-low-border);
      background:
        linear-gradient(180deg, var(--aqhi-low-bg-top), var(--aqhi-low-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.wind-moderate {
      border-color: var(--aqhi-moderate-border);
      background:
        linear-gradient(180deg, var(--aqhi-moderate-bg-top), var(--aqhi-moderate-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.wind-high {
      border-color: var(--aqhi-high-border);
      background:
        linear-gradient(180deg, var(--aqhi-high-bg-top), var(--aqhi-high-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.wind-veryhigh {
      border-color: var(--aqhi-veryhigh-border);
      background:
        linear-gradient(180deg, var(--aqhi-veryhigh-bg-top), var(--aqhi-veryhigh-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat-label {
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.78px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-sub {
      font-size: 11px;
      line-height: 1.14;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wind-value-wrap {
      display: flex;
      align-items: baseline;
      gap: 2px;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .wind-main {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .wind-unit {
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      position: relative;
      top: -1px;
    }

    .aqhi-health-label {
      font-size: 10px;
      line-height: 1;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .aqhi-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-top: 1px;
    }

    .aqhi-badge {
      min-width: 31px;
      height: 31px;
      padding: 0 7px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      background: rgba(255,255,255,0.08);
      border: 2px solid currentColor;
      color: inherit;
      flex-shrink: 0;
    }

    .aqhi-risk {
      font-size: 17px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      min-width: 0;
    }

    .stat.air-quality.aqhi-low .aqhi-badge { color: var(--aqhi-low-accent); }
    .stat.air-quality.aqhi-moderate .aqhi-badge { color: var(--aqhi-moderate-accent); }
    .stat.air-quality.aqhi-high .aqhi-badge { color: var(--aqhi-high-accent); }
    .stat.air-quality.aqhi-veryhigh .aqhi-badge { color: var(--aqhi-veryhigh-accent); }

    #sunset {
      font-size: 15px;
      letter-spacing: -0.1px;
    }

    #humidity {
      font-size: 15px;
    }

    #uv-value {
      font-size: 17px;
    }

    .alerts-link {
      display: flex;
      min-width: 0;
      min-height: 100%;
      text-decoration: none;
      color: inherit;
      height: 100%;
    }

    .alerts-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      min-height: 100%;
      border-radius: 12px;
      border: 1px solid var(--alert-none-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-none-bg);
      padding: 10px 14px;
      min-width: 0;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .alerts-row.alert-none {
      border-color: var(--alert-none-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-none-bg);
    }

    .alerts-row.alert-watch {
      border-color: var(--alert-watch-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-watch-bg);
    }

    .alerts-row.alert-warning {
      border-color: var(--alert-warning-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-warning-bg);
    }

    .alerts-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      flex-shrink: 0;
      background: var(--alert-none-dot);
      box-shadow: 0 0 0 3px rgba(126, 166, 255, 0.12);
    }

    .alerts-row.alert-watch .alerts-dot {
      background: var(--alert-watch-dot);
      box-shadow: 0 0 0 3px rgba(255, 209, 93, 0.16);
    }

    .alerts-row.alert-warning .alerts-dot {
      background: var(--alert-warning-dot);
      box-shadow: 0 0 0 3px rgba(255, 140, 111, 0.14);
    }

    .alerts-text {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .alerts-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alerts-sub {
      font-size: 11px;
      line-height: 1.08;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 12px;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      min-height: 0;
      min-width: 0;
    }

    .forecast-day {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 7px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .forecast-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-date {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-top: 2px;
      margin-bottom: 5px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-icon-wrap {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .forecast-icon-wrap img {
      width: 33px;
      height: 33px;
      object-fit: contain;
      display: block;
    }

    .forecast-condition {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .forecast-divider {
      width: 18px;
      height: 1px;
      background: rgba(120, 160, 255, 0.22);
      border-radius: 999px;
      margin: 1px 0 5px;
      flex-shrink: 0;
    }

    .forecast-high {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-night {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-precip {
      font-size: 11px;
      line-height: 1.1;
      color: var(--text);
      margin-top: auto;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-height: 610px) {
      .card { gap: 8px; }
      .temp { font-size: 54px; }
      .descriptor-space { min-height: 108px; }
      .middle { gap: 7px; }
      .stat { min-height: 56px; }
      .forecast-day { padding-top: 6px; padding-bottom: 6px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="left-top">
        <div class="title" id="title">View Royal</div>
        <div class="updated" id="updated">Loading live conditions…</div>

        <div class="hero">
          <div class="hero-main">
            <div class="temp" id="temp">--°</div>
            <div class="temp-icon-wrap">
              <img id="temp-icon" alt="Weather" src="https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/overcast.svg" />
            </div>
          </div>

          <div class="status-row">
            <div class="condition" id="condition">Loading</div>
            <div class="precip" id="precip">&nbsp;</div>
          </div>

          <div class="feels" id="feels">Feels --°</div>
          <div class="high-low-inline" id="high-low-inline">H: --°   L: --°</div>
        </div>
      </div>

      <div class="right-top">
        <div class="descriptor-space" id="descriptor-space">
          <div class="descriptor-item">
            <div class="descriptor-title">Checking conditions…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="middle">
      <div class="stat slot-wind" id="wind-stat">
        <div class="stat-label">Wind</div>
        <div class="wind-value-wrap">
          <span class="wind-main" id="wind-main">-- --</span>
          <span class="wind-unit" id="wind-unit">km/h</span>
        </div>
        <div class="stat-sub" id="wind-sub">Current wind speed</div>
      </div>

      <div class="stat air-quality aqhi-low slot-air" id="aqhi-stat">
        <div class="stat-label">Air Quality</div>
        <div class="aqhi-health-label">Health Risk</div>
        <div class="aqhi-main">
          <div class="aqhi-badge" id="aqhi-badge">--</div>
          <div class="aqhi-risk" id="aqhi-risk">Loading</div>
        </div>
      </div>

      <div class="stat slot-uv" id="uv-stat">
        <div class="stat-label">UV</div>
        <div class="stat-value" id="uv-value">--</div>
      </div>

      <div class="slot-alerts">
        <a class="alerts-link" id="alerts-link" href="https://weather.gc.ca/warnings/report_e.html?bc43=" target="_blank" rel="noopener noreferrer">
          <div class="alerts-row alert-none" id="alerts-row">
            <div class="alerts-dot"></div>
            <div class="alerts-text">
              <div class="alerts-title" id="alerts-title">Greater Victoria alerts</div>
              <div class="alerts-sub" id="alerts-sub"></div>
            </div>
          </div>
        </a>
      </div>

      <div class="stat slot-sunset">
        <div class="stat-label">Sunset</div>
        <div class="stat-value" id="sunset">--:--</div>
        <div class="stat-sub">Local time</div>
      </div>

      <div class="stat slot-humidity">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
        <div class="stat-sub">Current</div>
      </div>
    </div>

    <div class="forecast" id="forecast"></div>
  </div>

  <script>
    const LAT = 48.4621;
    const LON = -123.4689;
    const TZ = 'America/Vancouver';
    const AQHI_RADIUS_KM = 5;

    const ALERTS_URL = 'https://weather.gc.ca/warnings/report_e.html?bc43=';

    const WEATHER_URL =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${LAT}` +
      `&longitude=${LON}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day,precipitation_probability,uv_index` +
      `&hourly=weather_code,is_day` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunset,uv_index_max` +
      `&timezone=${encodeURIComponent(TZ)}` +
      `&forecast_days=5` +
      `&cell_selection=land`;

    const AQHI_OBS_API_URL =
      `https://api.weather.gc.ca/collections/aqhi-observations-realtime/items?f=json&bbox=-123.72,48.28,-123.22,48.62&limit=200`;

    const AQHI_PAGE_MAP = {
      westshore: 'https://r.jina.ai/http://weather.gc.ca/airquality/pages/bcaq-015_e.html',
      victoria_saanich: 'https://r.jina.ai/http://weather.gc.ca/airquality/pages/bcaq-010_e.html'
    };

    const TWN_AIR_PROXY_URL = 'https://r.jina.ai/http://www.theweathernetwork.com/en/city/ca/british-columbia/victoria/air-quality';
    const ALERTS_PROXY_URL = 'https://r.jina.ai/http://weather.gc.ca/warnings/report_e.html?bc43=';

    const FETCH_TIMEOUT_MS = 7000;

    const el = (id) => document.getElementById(id);

    const POLLUTANT_META = {
      particles: {
        label: 'Particles',
        desc: 'Smoke, dust, soot'
      },
      ozone: {
        label: 'Ozone (O₃)',
        desc: 'Smog / sunny pollution'
      },
      no2: {
        label: 'NO₂',
        desc: 'Traffic / fuel exhaust'
      },
      unknown: {
        label: 'Cause unknown',
        desc: 'No clear pollutant posted'
      }
    };

    function roundTemp(value) {
      return `${Math.round(value)}°`;
    }

    function formatShortTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString('en-CA', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: TZ
      }).replace(':00', '').toLowerCase();
    }

    function formatUpdated(timestamp = new Date()) {
      return new Date(timestamp).toLocaleString('en-CA', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: TZ
      }).replace(',', '');
    }

    function formatDayName(isoDate) {
      return new Date(`${isoDate}T12:00:00`).toLocaleDateString('en-CA', {
        weekday: 'short',
        timeZone: TZ
      });
    }

    function formatDayDate(isoDate) {
      return new Date(`${isoDate}T12:00:00`).toLocaleDateString('en-CA', {
        month: 'short',
        day: 'numeric',
        timeZone: TZ
      });
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function compassDirection(deg) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      return dirs[Math.round((((deg % 360) + 360) % 360) / 45) % 8];
    }

    function getWindClass(speed) {
      if (speed < 5) return '';
      if (speed < 15) return 'wind-low';
      if (speed < 30) return 'wind-moderate';
      if (speed < 50) return 'wind-high';
      return 'wind-veryhigh';
    }

    function getAqhiClass(value) {
      if (value <= 3) return 'aqhi-low';
      if (value <= 6) return 'aqhi-moderate';
      if (value <= 9) return 'aqhi-high';
      return 'aqhi-veryhigh';
    }

    function getUvClass(value) {
      if (!Number.isFinite(value) || value < 3) return 'uv-low';
      if (value < 6) return 'uv-moderate';
      if (value < 8) return 'uv-high';
      return 'uv-veryhigh';
    }

    function formatAqhiValue(value) {
      if (!Number.isFinite(value)) return '—';
      return value >= 10 ? '10+' : String(Math.round(value));
    }

    function aqhiRiskLabel(value) {
      if (!Number.isFinite(value)) return 'Unavailable';
      if (value <= 3) return 'Low';
      if (value <= 6) return 'Moderate';
      if (value <= 9) return 'High';
      return 'Very High';
    }

    function iconUrl(name) {
      return `https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/${name}.svg`;
    }

    function weatherMeta(code, isDay = true) {
      if (code === 0) return { text: 'Clear', icon: isDay ? 'clear-day' : 'clear-night' };
      if ([1, 2].includes(code)) return { text: 'Partly cloudy', icon: isDay ? 'partly-cloudy-day' : 'partly-cloudy-night' };
      if (code === 3) return { text: 'Overcast', icon: 'overcast' };
      if ([45, 48].includes(code)) return { text: 'Fog', icon: 'fog' };
      if ([51, 53, 55, 56, 57].includes(code)) return { text: 'Drizzle', icon: 'drizzle' };
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { text: 'Rain', icon: 'rain' };
      if ([71, 73, 75, 77, 85, 86].includes(code)) return { text: 'Snow', icon: 'snow' };
      if ([95, 96, 99].includes(code)) return { text: 'Storm', icon: 'thunderstorms-rain' };
      return { text: 'Overcast', icon: 'overcast' };
    }

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    async function fetchWithTimeout(url, responseType = 'json') {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const res = await fetch(url, {
          cache: 'no-store',
          signal: controller.signal
        });

        if (!res.ok) {
          throw new Error(`Fetch failed: ${res.status}`);
        }

        return responseType === 'text' ? await res.text() : await res.json();
      } finally {
        clearTimeout(timeout);
      }
    }

    function fetchText(url) {
      return fetchWithTimeout(url, 'text');
    }

    function fetchJson(url) {
      return fetchWithTimeout(url, 'json');
    }

    function setWind(speed, gust, dirDeg) {
      const windStat = el('wind-stat');
      windStat.className = 'stat slot-wind';
      const windClass = getWindClass(speed);
      if (windClass) windStat.classList.add(windClass);

      const dir = compassDirection(dirDeg);
      el('wind-main').textContent = `${Math.round(speed)} ${dir}`;
      el('wind-sub').textContent = gust && gust >= speed + 3
        ? `Gust ${Math.round(gust)} km/h`
        : speed < 5 ? 'Calm' : 'Steady';
    }

    function setUv(uvNow) {
      const uvStat = el('uv-stat');
      uvStat.className = 'stat slot-uv';
      uvStat.classList.add(getUvClass(uvNow));
      el('uv-value').textContent = Number.isFinite(uvNow) ? String(Math.round(uvNow * 10) / 10) : '—';
    }

    function mapFeature(feature) {
      const coords = feature?.geometry?.coordinates || [];
      const lon = Number(coords[0]);
      const lat = Number(coords[1]);
      const name = String(feature?.properties?.location_name_en || '');
      const distance = Number.isFinite(lat) && Number.isFinite(lon)
        ? distanceKm(LAT, LON, lat, lon)
        : Number.POSITIVE_INFINITY;

      return {
        feature,
        lat,
        lon,
        name,
        nameLower: name.toLowerCase(),
        distance
      };
    }

    function pickAqhiFeature(features) {
      if (!Array.isArray(features) || !features.length) return null;

      const mapped = features.map(mapFeature);

      const westshore = mapped.find(x => x.nameLower.includes('westshore'));
      if (westshore) return westshore;

      const victoriaSaanich = mapped.find(x =>
        x.nameLower.includes('victoria/saanich') ||
        (x.nameLower.includes('victoria') && x.nameLower.includes('saanich'))
      );
      if (victoriaSaanich) return victoriaSaanich;

      const withinRadius = mapped
        .filter(x => x.distance <= AQHI_RADIUS_KM)
        .sort((a, b) => a.distance - b.distance);

      return withinRadius[0] || null;
    }

    function getAqhiPageUrl(nameLower) {
      if (nameLower.includes('westshore')) return AQHI_PAGE_MAP.westshore;
      if (nameLower.includes('victoria/saanich') || (nameLower.includes('victoria') && nameLower.includes('saanich'))) {
        return AQHI_PAGE_MAP.victoria_saanich;
      }
      return null;
    }

    function classifyPollutantFromText(text) {
      const lower = String(text || '').toLowerCase();

      if (
        lower.includes('primary pollutant') &&
        (lower.includes('pm2.5') || lower.includes('pm 2.5'))
      ) return 'particles';

      if (
        lower.includes('primary pollutant') &&
        (lower.includes('ozone') || lower.includes('o₃') || lower.includes('o3'))
      ) return 'ozone';

      if (
        lower.includes('primary pollutant') &&
        (lower.includes('nitrogen dioxide') || lower.includes('no₂') || lower.includes('no2'))
      ) return 'no2';

      if (
        lower.includes('pm2.5') ||
        lower.includes('pm 2.5') ||
        lower.includes('fine particles') ||
        lower.includes('particulate matter')
      ) return 'particles';

      if (
        lower.includes('ground-level ozone') ||
        lower.includes('ozone (o₃)') ||
        lower.includes('ozone (o3)') ||
        lower.includes('ozone')
      ) return 'ozone';

      if (
        lower.includes('nitrogen dioxide') ||
        lower.includes('no₂') ||
        lower.includes('no2')
      ) return 'no2';

      return null;
    }

    function setAirCard(aqhiData) {
      const aqhiStat = el('aqhi-stat');
      aqhiStat.className = 'stat air-quality slot-air';

      const currentValue = Number(aqhiData?.value);

      if (Number.isFinite(currentValue)) {
        aqhiStat.classList.add(getAqhiClass(currentValue));
        el('aqhi-risk').textContent = aqhiRiskLabel(currentValue);
        el('aqhi-badge').textContent = formatAqhiValue(currentValue);
      } else {
        aqhiStat.classList.add('aqhi-low');
        el('aqhi-risk').textContent = 'Unavailable';
        el('aqhi-badge').textContent = '—';
      }
    }

    function setDescriptorContent(aqhiData, alerts) {
      const items = [];

      if (alerts && alerts.count > 0) {
        items.push(`
          <div class="descriptor-item">
            <div class="descriptor-title">Alert • ${escapeHtml(alerts.shortLabel || 'Weather')}</div>
            <div class="descriptor-sub">${escapeHtml(alerts.headline || 'Active alert')}</div>
          </div>
        `);
      }

      const meta = POLLUTANT_META[aqhiData?.pollutantKey || 'unknown'];

      if (items.length) {
        items.push('<div class="descriptor-sep"></div>');
      }

      items.push(`
        <div class="descriptor-item">
          <div class="descriptor-title">Air • ${escapeHtml(meta.label)}</div>
          <div class="descriptor-sub">${escapeHtml(meta.desc)}</div>
        </div>
      `);

      el('descriptor-space').innerHTML = items.join('');
    }

    function getMiddayWeatherMeta(hourly, date) {
      if (!hourly?.time || !hourly?.weather_code) {
        return weatherMeta(3, true);
      }

      const targetPrefix = `${date}T12:00`;
      let index = hourly.time.findIndex(t => String(t).startsWith(targetPrefix));

      if (index === -1) {
        index = hourly.time.findIndex(t => String(t).startsWith(`${date}T13:00`));
      }
      if (index === -1) {
        index = hourly.time.findIndex(t => String(t).startsWith(`${date}T11:00`));
      }
      if (index === -1) {
        index = hourly.time.findIndex(t => String(t).startsWith(`${date}T14:00`));
      }
      if (index === -1) {
        index = hourly.time.findIndex(t => String(t).startsWith(`${date}T10:00`));
      }

      if (index === -1) {
        return weatherMeta(3, true);
      }

      return weatherMeta(
        Number(hourly.weather_code[index]),
        Boolean(hourly.is_day?.[index] ?? true)
      );
    }

    function renderForecast(daily, hourly) {
      const forecast = el('forecast');
      forecast.innerHTML = daily.time.map((date, i) => {
        const meta = getMiddayWeatherMeta(hourly, date);
        const precip = daily.precipitation_probability_max?.[i];
        return `
          <div class="forecast-day">
            <div class="forecast-name">${formatDayName(date)}</div>
            <div class="forecast-date">${formatDayDate(date)}</div>
            <div class="forecast-icon-wrap"><img alt="${escapeHtml(meta.text)}" src="${iconUrl(meta.icon)}" /></div>
            <div class="forecast-condition">${escapeHtml(meta.text)}</div>
            <div class="forecast-divider"></div>
            <div class="forecast-high">${Math.round(daily.temperature_2m_max[i])}°</div>
            <div class="forecast-night">Night ${Math.round(daily.temperature_2m_min[i])}°</div>
            <div class="forecast-precip">${typeof precip === 'number' ? `💧 ${Math.round(precip)}%` : '&nbsp;'}</div>
          </div>
        `;
      }).join('');
    }

    function setAlertsBar(alerts) {
      const row = el('alerts-row');
      const title = el('alerts-title');
      const sub = el('alerts-sub');
      el('alerts-link').href = ALERTS_URL;

      row.className = 'alerts-row';

      if (!alerts || alerts.status === 'error') {
        row.classList.add('alert-none');
        title.textContent = 'Greater Victoria alerts';
        sub.textContent = 'Click For Full Details';
        return;
      }

      if (alerts.count === 0) {
        row.classList.add('alert-none');
        title.textContent = 'No alerts in effect';
        sub.textContent = '';
        return;
      }

      const worst = alerts.severity || 'warning';
      row.classList.add(worst === 'watch' ? 'alert-watch' : 'alert-warning');
      title.textContent = alerts.headline || 'Active weather alert';
      sub.textContent = 'Click For Full Details';
    }

    async function loadAqhi() {
      try {
        const obsData = await fetchJson(AQHI_OBS_API_URL);
        const pickedObs = pickAqhiFeature(obsData?.features || []);

        if (!pickedObs) {
          return { value: null, pollutantKey: 'unknown' };
        }

        const obsProps = pickedObs.feature?.properties || {};
        const obsValue = Number(obsProps.aqhi);

        let pollutantKey = null;

        const ecUrl = getAqhiPageUrl(pickedObs.nameLower);
        if (ecUrl) {
          try {
            const ecText = await fetchText(ecUrl);
            pollutantKey = classifyPollutantFromText(ecText);
          } catch (error) {
            console.warn('EC AQ cause fetch failed.', error);
          }
        }

        if (!pollutantKey) {
          try {
            const twnText = await fetchText(TWN_AIR_PROXY_URL);
            pollutantKey = classifyPollutantFromText(twnText);
          } catch (error) {
            console.warn('TWN AQ cause fetch failed.', error);
          }
        }

        return {
          value: Number.isFinite(obsValue) ? Math.round(obsValue) : null,
          pollutantKey: pollutantKey || 'unknown'
        };
      } catch (error) {
        console.warn('AQHI load failed.', error);
        return {
          value: null,
          pollutantKey: 'unknown'
        };
      }
    }

    function parseAlerts(text) {
      const clean = String(text || '').replace(/\r/g, '');

      if (/No alerts in effect/i.test(clean)) {
        return {
          count: 0,
          severity: 'none',
          headline: 'No alerts in effect',
          shortLabel: ''
        };
      }

      const lines = clean.split('\n').map((l) => l.trim()).filter(Boolean);

      const candidates = lines.filter((line) => {
        return /warning|watch|advisory|statement/i.test(line) &&
               !/learn more|feedback|about this site|features|weather shortcuts/i.test(line);
      });

      if (!candidates.length) {
        return {
          count: 0,
          severity: 'none',
          headline: 'No alerts in effect',
          shortLabel: ''
        };
      }

      const headline = candidates[0];
      const severity = /watch/i.test(headline) && !/warning/i.test(headline)
        ? 'watch'
        : 'warning';

      let shortLabel = 'Weather';
      if (/wind/i.test(headline)) shortLabel = 'Wind';
      else if (/rain/i.test(headline)) shortLabel = 'Rain';
      else if (/snow/i.test(headline)) shortLabel = 'Snow';
      else if (/fog/i.test(headline)) shortLabel = 'Fog';
      else if (/thunder/i.test(headline)) shortLabel = 'Storm';
      else if (/heat/i.test(headline)) shortLabel = 'Heat';
      else if (/cold|arctic/i.test(headline)) shortLabel = 'Cold';

      return {
        count: candidates.length,
        severity,
        headline,
        shortLabel
      };
    }

    async function loadAlerts() {
      try {
        const text = await fetchText(ALERTS_PROXY_URL);
        return parseAlerts(text);
      } catch (error) {
        console.warn('Alerts parse failed.', error);
        return { status: 'error', count: 0 };
      }
    }

    async function loadWeather() {
      return fetchJson(WEATHER_URL);
    }

    function applyWeather(weather) {
      const current = weather.current;
      const daily = weather.daily;
      const hourly = weather.hourly;
      const currentMeta = weatherMeta(current.weather_code, Boolean(current.is_day));

      el('title').textContent = 'View Royal';
      el('updated').textContent = `Updated ${formatUpdated()}`;
      el('temp').textContent = roundTemp(current.temperature_2m);
      el('temp-icon').src = iconUrl(currentMeta.icon);
      el('temp-icon').alt = currentMeta.text;
      el('condition').textContent = currentMeta.text;

      const precipProb = current.precipitation_probability;
      el('precip').textContent = (typeof precipProb === 'number' && precipProb >= 15)
        ? `Rain ${Math.round(precipProb)}%`
        : '';

      el('feels').textContent = `Feels ${roundTemp(current.apparent_temperature)}`;
      el('high-low-inline').textContent = `H: ${Math.round(daily.temperature_2m_max[0])}°   L: ${Math.round(daily.temperature_2m_min[0])}°`;
      el('humidity').textContent = `${Math.round(current.relative_humidity_2m)}%`;
      el('sunset').textContent = formatShortTime(daily.sunset[0]);

      setWind(current.wind_speed_10m, current.wind_gusts_10m, current.wind_direction_10m);
      setUv(current.uv_index);
      renderForecast(daily, hourly);
    }

    async function loadLiveWidget() {
      try {
        const weather = await loadWeather();
        applyWeather(weather);

        const [aqhi, alerts] = await Promise.allSettled([
          loadAqhi(),
          loadAlerts()
        ]);

        const aqhiData = aqhi.status === 'fulfilled'
          ? aqhi.value
          : { value: null, pollutantKey: 'unknown' };

        const alertsData = alerts.status === 'fulfilled'
          ? alerts.value
          : { status: 'error', count: 0 };

        setAirCard(aqhiData);
        setAlertsBar(alertsData);
        setDescriptorContent(aqhiData, alertsData);
      } catch (error) {
        console.error(error);
        el('updated').textContent = 'Live widget failed to load';
        el('condition').textContent = 'Preview error';
        el('descriptor-space').innerHTML = `
          <div class="descriptor-item">
            <div class="descriptor-title">Weather widget failed</div>
          </div>
        `;
        setAlertsBar({ status: 'error' });
      }
    }

    loadLiveWidget();
  </script>
</body>
</html>
