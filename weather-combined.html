      --border: rgba(80, 145, 255, 0.22);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.82);
      --alert-warning-bg: rgba(255, 120, 90, 0.14);
      --alert-warning-border: rgba(255, 130, 100, 0.36);
      --alert-watch-bg: rgba(255, 193, 77, 0.13);

      --aqhi-low-border: rgba(20, 153, 211, 0.42);
      --aqhi-moderate-accent: #ffc323;
      --aqhi-moderate-bg-top: rgba(255, 195, 35, 0.18);
      --aqhi-moderate-bg-bottom: rgba(255, 195, 35, 0.08);
      --aqhi-moderate-border: rgba(255, 195, 35, 0.42);
      --aqhi-high-accent: #ff5b5b;

      --aqhi-high-bg-bottom: rgba(255, 91, 91, 0.08);
      --aqhi-high-border: rgba(255, 91, 91, 0.42);
      --aqhi-veryhigh-accent: #ad0000;
      --aqhi-veryhigh-bg-top: rgba(173, 0, 0, 0.18);
      --aqhi-veryhigh-bg-bottom: rgba(173, 0, 0, 0.08);
      --aqhi-veryhigh-border: rgba(173, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #020817;
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }
    body { padding: 8px; }

    .card {
      width: 100%;
      height: calc(100vh - 16px);
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        linear-gradient(180deg, #07122b, #040b1f);
      border: 1px solid var(--border);
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 7px;
      overflow: hidden;
      contain: layout paint;
    }
