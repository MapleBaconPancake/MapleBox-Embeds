<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Weather Combined</title>

  <style>
    :root{
      --bg: #040b1f;
      --card: #07122b;
      --panel: #081630;
      --panel-2: #091936;
      --border: rgba(80, 145, 255, 0.22);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.82);

      --alert-ok-bg: rgba(62, 181, 112, 0.12);
      --alert-ok-border: rgba(86, 214, 140, 0.28);

      --alert-info-bg: rgba(96, 150, 255, 0.12);
      --alert-info-border: rgba(110, 165, 255, 0.28);

      --alert-watch-bg: rgba(255, 193, 77, 0.13);
      --alert-watch-border: rgba(255, 203, 97, 0.34);

      --alert-warning-bg: rgba(255, 120, 90, 0.14);
      --alert-warning-border: rgba(255, 130, 100, 0.36);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        linear-gradient(180deg, #07122b, #040b1f);
      border: 1px solid var(--border);
      box-shadow: none;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto auto auto;
      gap: 7px;
      overflow: hidden;
      contain: layout paint;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 3px;
      color: var(--text);
      letter-spacing: 0.1px;
    }

    .subtitle,
    .updated {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.15;
    }

    .subtitle {
      margin-bottom: 3px;
    }

    .updated {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .hero-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .temp {
      font-size: 54px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -1.3px;
      margin: 0;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .temp-icon-wrap {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 3px;
    }

    #weatherIcon {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .condition {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.15;
      margin-top: 2px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feels {
      font-size: 14px;
      line-height: 1.15;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      min-height: 0;
    }

    .stat {
      min-height: 58px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 8px 9px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .stat-label {
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-sub {
      font-size: 11px;
      line-height: 1;
      color: var(--muted);
      margin-top: 4px;
    }

    .alerts-link {
      display: block;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .alerts-strip {
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid var(--alert-ok-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-ok-bg);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      overflow: hidden;
    }

    .alerts-strip.info {
      border-color: var(--alert-info-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-info-bg);
    }

    .alerts-strip.watch {
      border-color: var(--alert-watch-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-watch-bg);
    }

    .alerts-strip.warning {
      border-color: var(--alert-warning-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-warning-bg);
    }

    .alerts-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      flex-shrink: 0;
      background: #61d98f;
      box-shadow: 0 0 0 3px rgba(97, 217, 143, 0.12);
    }

    .alerts-strip.info .alerts-dot {
      background: #7fa7ff;
      box-shadow: 0 0 0 3px rgba(127, 167, 255, 0.13);
    }

    .alerts-strip.watch .alerts-dot {
      background: #ffcf63;
      box-shadow: 0 0 0 3px rgba(255, 207, 99, 0.14);
    }

    .alerts-strip.warning .alerts-dot {
      background: #ff8c6f;
      box-shadow: 0 0 0 3px rgba(255, 140, 111, 0.14);
    }

    .alerts-text {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .alerts-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alerts-sub {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alerts-badge {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      white-space: nowrap;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      min-height: 0;
    }

    .forecast-day {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 7px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .forecast-name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      margin-bottom: 5px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-icon-wrap {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .forecast-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
    }

    .forecast-cond {
      font-size: 12px;
      line-height: 1.08;
      color: var(--muted);
      text-align: center;
      min-height: 26px;
      max-height: 26px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 5px;
    }

    .forecast-temps {
      margin-top: auto;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .card {
        padding: 9px;
        gap: 6px;
        border-radius: 0;
      }

      .title { font-size: 17px; }
      .subtitle, .updated { font-size: 11px; }

      .temp { font-size: 46px; }

      .temp-icon-wrap {
        width: 30px;
        height: 30px;
      }

      #weatherIcon {
        width: 26px;
        height: 26px;
      }

      .condition { font-size: 16px; }
      .feels { font-size: 13px; }

      .stat {
        min-height: 54px;
        padding: 7px 8px;
      }

      .stat-label { font-size: 9px; }
      .stat-value { font-size: 16px; }
      .stat-sub { font-size: 10px; }

      .alerts-strip {
        min-height: 41px;
        padding: 7px 9px;
      }

      .alerts-title { font-size: 12px; }
      .alerts-sub { font-size: 10px; }
      .alerts-badge { font-size: 9px; padding: 5px 7px; }

      .forecast-name { font-size: 12px; }
      .forecast-cond {
        font-size: 11px;
        min-height: 24px;
        max-height: 24px;
      }
      .forecast-temps { font-size: 14px; }

      .forecast-icon-wrap {
        width: 22px;
        height: 22px;
      }

      .forecast-icon {
        width: 20px;
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="title-wrap">
        <div class="title">Greater Victoria</div>
        <div class="subtitle">Current weather + 4-day forecast</div>
        <div class="updated" id="updated">Loading…</div>
      </div>
    </div>

    <div class="hero">
      <div class="hero-main">
        <div class="temp" id="temp">--°C</div>
        <div class="temp-icon-wrap">
          <img id="weatherIcon" alt="Current weather" />
        </div>
      </div>
      <div class="condition" id="condition">Loading…</div>
      <div class="feels" id="feelsLike">Feels like --°C</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Wind speed</div>
        <div class="stat-value" id="wind">-- km/h</div>
      </div>

      <div class="stat">
        <div class="stat-label">Wind gusts</div>
        <div class="stat-value" id="gust">-- km/h</div>
      </div>

      <div class="stat">
        <div class="stat-label">Direction</div>
        <div class="stat-value" id="direction">--</div>
        <div class="stat-sub" id="directionDeg">--°</div>
      </div>

      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
      </div>
    </div>

    <a
      class="alerts-link"
      id="alertsLink"
      href="https://weather.gc.ca/warnings/report_e.html?bc43="
      target="_blank"
      rel="noopener noreferrer"
    >
      <div class="alerts-strip" id="alertsStrip">
        <div class="alerts-dot"></div>
        <div class="alerts-text">
          <div class="alerts-title" id="alertsTitle">Checking alerts…</div>
          <div class="alerts-sub" id="alertsSub">Loading current alert status</div>
        </div>
        <div class="alerts-badge" id="alertsBadge">Alerts</div>
      </div>
    </a>

    <div class="forecast">
      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>
    </div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const API_URL =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=auto&wind_speed_unit=kmh&forecast_days=4`;

    const ALERTS_URL = "https://victoria-alerts.j-r-moroschan.workers.dev";
    const OFFICIAL_ALERTS_URL = "https://weather.gc.ca/warnings/report_e.html?bc43=";

    const ICON_BASE = "https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/";
    const FALLBACK_DAY = "partly-cloudy-day.svg";
    const FALLBACK_NIGHT = "partly-cloudy-night.svg";
    const FORECAST_FALLBACK = "partly-cloudy-day.svg";

    function codeText(code) {
      if (code === 0) return "Clear";
      if (code === 1) return "Mainly clear";
      if (code === 2) return "Partly cloudy";
      if (code === 3) return "Overcast";
      if (code === 45 || code === 48) return "Fog";
      if ([51, 53, 55].includes(code)) return "Drizzle";
      if ([56, 57].includes(code)) return "Freezing drizzle";
      if ([61, 63, 65].includes(code)) return "Rain";
      if ([66, 67].includes(code)) return "Freezing rain";
      if ([71, 73, 75, 77].includes(code)) return "Snow";
      if ([80, 81, 82].includes(code)) return "Showers";
      if ([85, 86].includes(code)) return "Snow showers";
      if ([95, 96, 99].includes(code)) return "Thunderstorm";
      return "Conditions unavailable";
    }

    function degToCompass(deg) {
      const dirs = ["N","NE","E","SE","S","SW","W","NW"];
      return dirs[Math.round((((deg % 360) + 360) % 360) / 45) % 8];
    }

    function fmtDay(dateStr) {
      return new Date(dateStr + "T12:00:00").toLocaleDateString("en-CA", {
        weekday: "short"
      });
    }

    function currentIconFile(code, isDay) {
      if (code === 0) return isDay ? "clear-day.svg" : "clear-night.svg";
      if (code === 1 || code === 2) return isDay ? "partly-cloudy-day.svg" : "partly-cloudy-night.svg";
      if (code === 3) return "overcast.svg";
      if (code === 45 || code === 48) return "fog.svg";
      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";
      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";
      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";
      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";
      if ([85, 86].includes(code)) return "snow.svg";
      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";
      return isDay ? FALLBACK_DAY : FALLBACK_NIGHT;
    }

    function forecastIconFile(code) {
      if (code === 0) return "clear-day.svg";
      if (code === 1 || code === 2) return "partly-cloudy-day.svg";
      if (code === 3) return "overcast.svg";
      if (code === 45 || code === 48) return "fog.svg";
      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";
      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";
      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";
      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";
      if ([85, 86].includes(code)) return "snow.svg";
      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";
      return FORECAST_FALLBACK;
    }

    function setImgWithFallback(img, file, fallback) {
      img.onerror = function () {
        this.onerror = null;
        this.src = ICON_BASE + fallback;
      };
      img.src = ICON_BASE + file;
    }

    function alertSeverity(alert) {
      const text = `${alert?.type || ""} ${alert?.title || ""} ${alert?.event || ""}`.toLowerCase();
      if (text.includes("warning")) return "warning";
      if (text.includes("watch")) return "watch";
      return "info";
    }

    function cleanAlertEvent(alert) {
      const raw = String(alert?.title || alert?.event || alert?.type || "Weather alert").trim();
      return raw
        .replace(/\s+/g, " ")
        .replace(/\bwarning\b/ig, "")
        .replace(/\bwatch\b/ig, "")
        .replace(/\badvisory\b/ig, "")
        .replace(/\balert\b/ig, "")
        .replace(/\s{2,}/g, " ")
        .replace(/^[·\-\s,]+|[·\-\s,]+$/g, "")
        .trim() || "Weather event";
    }

    function alertBadgeText(alert) {
      const text = `${alert?.type || ""} ${alert?.title || ""}`.toLowerCase();
      if (text.includes("warning")) return "Warning";
      if (text.includes("watch")) return "Watch";
      if (text.includes("advisory")) return "Advisory";
      return "Alert";
    }

    function setAlertDisplay(kind, title, sub, badge, href) {
      const strip = document.getElementById("alertsStrip");
      const link = document.getElementById("alertsLink");

      strip.classList.remove("info", "watch", "warning");
      if (kind) strip.classList.add(kind);

      document.getElementById("alertsTitle").textContent = title;
      document.getElementById("alertsSub").textContent = sub;
      document.getElementById("alertsBadge").textContent = badge;
      link.href = href || OFFICIAL_ALERTS_URL;
    }

    const forecastCards = Array.from(document.querySelectorAll(".forecast-day")).map(card => ({
      dow: card.querySelector("[data-dow]"),
      icon: card.querySelector("[data-icon]"),
      cond: card.querySelector("[data-cond]"),
      temps: card.querySelector("[data-temps]")
    }));

    async function loadWeather() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const c = data.current;

        document.getElementById("temp").textContent = `${Math.round(c.temperature_2m)}°C`;
        document.getElementById("condition").textContent = codeText(c.weather_code);
        document.getElementById("feelsLike").textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;

        document.getElementById("wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;
        document.getElementById("gust").textContent = `${Math.round(c.wind_gusts_10m || 0)} km/h`;

        const deg = Math.round(c.wind_direction_10m);
        document.getElementById("direction").textContent = degToCompass(c.wind_direction_10m);
        document.getElementById("directionDeg").textContent = `${deg}°`;

        document.getElementById("humidity").textContent = `${Math.round(c.relative_humidity_2m)}%`;
        document.getElementById("updated").textContent =
          `Updated ${new Date(c.time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        const currentImg = document.getElementById("weatherIcon");
        setImgWithFallback(
          currentImg,
          currentIconFile(c.weather_code, c.is_day === 1),
          c.is_day === 1 ? FALLBACK_DAY : FALLBACK_NIGHT
        );

        for (let i = 0; i < 4; i++) {
          const code = data.daily.weather_code[i];
          const card = forecastCards[i];

          card.dow.textContent = fmtDay(data.daily.time[i]);
          card.cond.textContent = codeText(code);
          card.temps.textContent =
            `${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°`;

          setImgWithFallback(card.icon, forecastIconFile(code), FORECAST_FALLBACK);
        }
      } catch (err) {
        document.getElementById("updated").textContent = "Weather update failed";
        console.error("Weather widget error:", err);
      }
    }

    async function loadAlerts() {
      try {
        const res = await fetch(ALERTS_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const alerts = Array.isArray(data?.alerts) ? data.alerts : [];
        const count = typeof data?.count === "number" ? data.count : alerts.length;
        const noAlerts = data?.noAlerts === true || count === 0;

        if (noAlerts) {
          setAlertDisplay(
            "",
            "No active alerts",
            "Tap for official Environment Canada alerts",
            "Clear",
            data?.officialPage || OFFICIAL_ALERTS_URL
          );
          return;
        }

        const sorted = [...alerts].sort((a, b) => {
          const priority = { warning: 0, watch: 1, info: 2 };
          return priority[alertSeverity(a)] - priority[alertSeverity(b)];
        });

        const top = sorted[0];
        const severity = alertSeverity(top);
        const badge = alertBadgeText(top);
        const eventText = cleanAlertEvent(top);
        const extra = count > 1 ? `+${count - 1} more active` : "Tap for full details";

        setAlertDisplay(
          severity,
          `${badge} · ${eventText}`,
          extra,
          count > 1 ? `${count} Alerts` : badge,
          top?.link || data?.officialPage || OFFICIAL_ALERTS_URL
        );
      } catch (err) {
        console.error("Alerts widget error:", err);
        setAlertDisplay(
          "info",
          "Alerts unavailable",
          "Tap for official Environment Canada alerts",
          "Alerts",
          OFFICIAL_ALERTS_URL
        );
      }
    }

    async function loadAll() {
      await Promise.allSettled([loadWeather(), loadAlerts()]);
    }

    loadAll();
    setInterval(loadWeather, 10 * 60 * 1000);
    setInterval(loadAlerts, 5 * 60 * 1000);
  </script>
</body>
</html>
