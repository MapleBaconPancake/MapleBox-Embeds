<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Combined Live</title>
  <style>
    :root{
      --panel: #071222;
      --panel-2: #081428;
      --border: rgba(95, 130, 205, 0.14);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.80);

      --alert-none-bg: rgba(55, 95, 150, 0.08);
      --alert-none-border: rgba(85, 125, 195, 0.16);
      --alert-none-dot: #4ed267;

      --alert-yellow-bg: rgba(255, 214, 10, 0.10);
      --alert-yellow-border: rgba(255, 214, 10, 0.28);
      --alert-yellow-icon: #fff200;

      --alert-orange-bg: rgba(255, 166, 0, 0.11);
      --alert-orange-border: rgba(255, 166, 0, 0.30);
      --alert-orange-icon: #ffa300;

      --alert-red-bg: rgba(220, 40, 40, 0.12);
      --alert-red-border: rgba(239, 68, 68, 0.30);
      --alert-red-icon: #e10600;

      --aqhi-low-accent: #1499d3;
      --aqhi-low-bg-top: rgba(20, 153, 211, 0.10);
      --aqhi-low-bg-bottom: rgba(20, 153, 211, 0.04);
      --aqhi-low-border: rgba(20, 153, 211, 0.26);

      --aqhi-moderate-accent: #ffc323;
      --aqhi-moderate-bg-top: rgba(255, 195, 35, 0.12);
      --aqhi-moderate-bg-bottom: rgba(255, 195, 35, 0.05);
      --aqhi-moderate-border: rgba(255, 195, 35, 0.28);

      --aqhi-high-accent: #ff5b5b;
      --aqhi-high-bg-top: rgba(255, 91, 91, 0.12);
      --aqhi-high-bg-bottom: rgba(255, 91, 91, 0.05);
      --aqhi-high-border: rgba(255, 91, 91, 0.28);

      --aqhi-veryhigh-accent: #ad0000;
      --aqhi-veryhigh-bg-top: rgba(173, 0, 0, 0.13);
      --aqhi-veryhigh-bg-bottom: rgba(173, 0, 0, 0.05);
      --aqhi-veryhigh-border: rgba(173, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top right, rgba(22, 103, 165, 0.10), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.008), rgba(255,255,255,0)),
        linear-gradient(180deg, #050e1d, #040914);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
      border: 0;
      outline: 0;
      box-shadow: none;
    }

    body {
      padding: 10px;
    }

    .card {
      width: 100%;
      height: 100%;
      border: 0 !important;
      outline: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background: transparent;
      -webkit-mask-image: none !important;
      mask-image: none !important;
      padding: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 8px;
      contain: layout paint;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 10px;
      min-width: 0;
      align-items: start;
    }

    .left-top {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 4px;
      letter-spacing: 0.1px;
    }

    .updated {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.15;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero {
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding-bottom: 2px;
    }

    .hero-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .temp {
      font-size: 58px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -1.4px;
      margin: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .temp-icon-wrap {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .temp-icon-wrap img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
    }

    .status-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .condition {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .precip {
      font-size: 13px;
      line-height: 1.1;
      color: var(--muted);
      white-space: nowrap;
    }

    .feels, .high-low-inline {
      font-size: 14px;
      line-height: 1.15;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .right-top {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-self: stretch;
    }

    .descriptor-space {
      min-height: 116px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
      text-align: right;
      padding-top: 4px;
      background: transparent;
    }

    .descriptor-item {
      width: fit-content;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-width: 0;
      margin-left: auto;
    }

    .descriptor-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.12;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .descriptor-sub {
      font-size: 11px;
      line-height: 1.18;
      color: var(--muted);
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .descriptor-sep {
      width: min(100%, 220px);
      height: 1px;
      background: rgba(120, 160, 255, 0.12);
      margin: 1px 0 2px;
      flex-shrink: 0;
    }

    .middle {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-areas:
        "wind wind wind air air air air uv uv uv"
        "alerts alerts alerts alerts alerts alerts sunset sunset humidity humidity";
      gap: 8px;
      min-width: 0;
      min-height: 0;
      margin-top: 8px;
      align-items: stretch;
    }

    .slot-wind { grid-area: wind; }
    .slot-air { grid-area: air; }
    .slot-uv { grid-area: uv; }
    .slot-alerts { grid-area: alerts; min-width: 0; min-height: 0; }
    .slot-sunset { grid-area: sunset; }
    .slot-humidity { grid-area: humidity; }

    .stat {
      min-height: 54px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      overflow: hidden;
    }

    .stat.air-quality.aqhi-low,
    .stat.uv-low,
    .stat.wind-low {
      border-color: var(--aqhi-low-border);
      background:
        linear-gradient(180deg, var(--aqhi-low-bg-top), var(--aqhi-low-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-moderate,
    .stat.uv-moderate,
    .stat.wind-moderate {
      border-color: var(--aqhi-moderate-border);
      background:
        linear-gradient(180deg, var(--aqhi-moderate-bg-top), var(--aqhi-moderate-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-high,
    .stat.uv-high,
    .stat.wind-high {
      border-color: var(--aqhi-high-border);
      background:
        linear-gradient(180deg, var(--aqhi-high-bg-top), var(--aqhi-high-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat.air-quality.aqhi-veryhigh,
    .stat.uv-veryhigh,
    .stat.wind-veryhigh {
      border-color: var(--aqhi-veryhigh-border);
      background:
        linear-gradient(180deg, var(--aqhi-veryhigh-bg-top), var(--aqhi-veryhigh-bg-bottom)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .stat-label {
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.78px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-sub {
      font-size: 11px;
      line-height: 1.12;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wind-value-wrap {
      display: flex;
      align-items: baseline;
      gap: 2px;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .wind-main, .wind-dir {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .wind-unit {
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      position: relative;
      top: -1px;
    }

    .aqhi-title-line {
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.78px;
      color: var(--muted);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .aqhi-badge-row {
      display: flex;
      align-items: center;
      min-width: 0;
      margin-bottom: 4px;
    }

    .aqhi-risk-row {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .aqhi-badge {
      min-width: 31px;
      height: 31px;
      padding: 0 7px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      background: rgba(255,255,255,0.08);
      border: 2px solid currentColor;
      color: inherit;
      flex-shrink: 0;
    }

    .aqhi-risk {
      font-size: 17px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      min-width: 0;
    }

    .stat.air-quality.aqhi-low .aqhi-badge { color: var(--aqhi-low-accent); }
    .stat.air-quality.aqhi-moderate .aqhi-badge { color: var(--aqhi-moderate-accent); }
    .stat.air-quality.aqhi-high .aqhi-badge { color: var(--aqhi-high-accent); }
    .stat.air-quality.aqhi-veryhigh .aqhi-badge { color: var(--aqhi-veryhigh-accent); }

    .uv-center {
      align-items: center;
      text-align: center;
    }

    #uv-value {
      font-size: 18px;
      width: 100%;
      text-align: center;
    }

    #sunset, #humidity {
      font-size: 15px;
      letter-spacing: -0.1px;
    }

    .alerts-link {
      display: flex;
      min-width: 0;
      min-height: 100%;
      text-decoration: none;
      color: inherit;
      height: 100%;
    }

    .alerts-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      min-height: 100%;
      border-radius: 12px;
      border: 1px solid var(--alert-none-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-none-bg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      padding: 10px 14px;
      min-width: 0;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .alerts-row.alert-none {
      border-color: var(--alert-none-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-none-bg);
    }

    .alerts-row.alert-yellow {
      border-color: var(--alert-yellow-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-yellow-bg);
    }

    .alerts-row.alert-orange {
      border-color: var(--alert-orange-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-orange-bg);
    }

    .alerts-row.alert-red {
      border-color: var(--alert-red-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        var(--alert-red-bg);
    }

    .alerts-indicator {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
    }

    .alerts-indicator.alert-none-icon {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--alert-none-dot);
      box-shadow: 0 0 0 3px rgba(81, 212, 106, 0.12);
    }

    .alerts-indicator.alert-yellow-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--alert-yellow-icon);
      color: #000;
      box-shadow: 0 0 0 3px rgba(255, 214, 10, 0.12);
    }

    .alerts-indicator.alert-orange-icon {
      width: 18px;
      height: 18px;
      background: var(--alert-orange-icon);
      transform: rotate(45deg);
      color: #000;
      box-shadow: 0 0 0 3px rgba(255, 163, 0, 0.12);
    }

    .alerts-indicator.alert-red-icon {
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 18px solid var(--alert-red-icon);
      transform: translateY(-1px);
      filter: drop-shadow(0 0 0 rgba(225, 6, 0, 0.12));
    }

    .alerts-indicator.alert-yellow-icon::before,
    .alerts-indicator.alert-orange-icon::before,
    .alerts-indicator.alert-red-icon::before {
      content: "!";
      position: absolute;
      font-weight: 900;
      line-height: 1;
      font-size: 13px;
      z-index: 2;
    }

    .alerts-indicator.alert-yellow-icon::before {
      color: #000;
      top: 2px;
      left: 6px;
    }

    .alerts-indicator.alert-orange-icon::before {
      color: #000;
      top: 2px;
      left: 6px;
      transform: rotate(-45deg);
    }

    .alerts-indicator.alert-red-icon::before {
      color: #fff;
      top: 7px;
      left: -3px;
      font-size: 14px;
    }

    .alerts-text {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    .alerts-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alerts-sub {
      font-size: 11px;
      line-height: 1.08;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 0;
      margin-top: 2px;
    }

    .alerts-sub:empty {
      display: none;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      min-height: 0;
      min-width: 0;
    }

    .forecast-day {
      border-radius: 12px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      padding: 7px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .forecast-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-date {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-top: 2px;
      margin-bottom: 5px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-icon-wrap {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .forecast-icon-wrap img {
      width: 33px;
      height: 33px;
      object-fit: contain;
      display: block;
    }

    .forecast-condition {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .forecast-divider {
      width: 18px;
      height: 1px;
      background: rgba(120, 160, 255, 0.16);
      border-radius: 999px;
      margin: 1px 0 5px;
      flex-shrink: 0;
    }

    .forecast-high {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-night {
      font-size: 11px;
      line-height: 1.1;
      color: var(--muted);
      margin-bottom: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-precip {
      font-size: 11px;
      line-height: 1.1;
      color: var(--text);
      margin-top: auto;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-height: 610px) {
      .card { gap: 7px; }
      .temp { font-size: 54px; }
      .descriptor-space { min-height: 108px; }
      .middle { gap: 7px; }
      .stat { min-height: 50px; padding: 6px 8px; }
      .forecast-day { padding-top: 6px; padding-bottom: 6px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="left-top">
        <div class="title" id="title">View Royal</div>
        <div class="updated" id="updated">Loading live conditions…</div>

        <div class="hero">
          <div class="hero-main">
            <div class="temp" id="temp">--°</div>
            <div class="temp-icon-wrap">
              <img id="temp-icon" alt="Weather" src="https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/overcast.svg" />
            </div>
          </div>

          <div class="status-row">
            <div class="condition" id="condition">Loading</div>
            <div class="precip" id="precip">&nbsp;</div>
          </div>

          <div class="feels" id="feels">Feels --°</div>
          <div class="high-low-inline" id="high-low-inline">H: --°   L: --°</div>
        </div>
      </div>

      <div class="right-top">
        <div class="descriptor-space" id="descriptor-space">
          <div class="descriptor-item">
            <div class="descriptor-title">Checking conditions…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="middle">
      <div class="stat slot-wind" id="wind-stat">
        <div class="stat-label">Wind</div>
        <div class="wind-value-wrap">
          <span class="wind-main" id="wind-main">--</span>
          <span class="wind-unit">km/h</span>
          <span class="wind-dir" id="wind-dir">--</span>
        </div>
        <div class="stat-sub" id="wind-sub">Current wind speed</div>
      </div>

      <div class="stat air-quality slot-air" id="aqhi-stat">
        <div class="aqhi-title-line">Air Quality Risk</div>
        <div class="aqhi-badge-row">
          <div class="aqhi-badge" id="aqhi-badge">--</div>
        </div>
        <div class="aqhi-risk-row">
          <div class="aqhi-risk" id="aqhi-risk">Loading</div>
        </div>
      </div>

      <div class="stat slot-uv uv-center" id="uv-stat">
        <div class="stat-label">UV</div>
        <div class="stat-value" id="uv-value">--</div>
      </div>

      <div class="slot-alerts">
        <a class="alerts-link" id="alerts-link" href="https://weather.gc.ca/warnings/report_e.html?bc43=" target="_blank" rel="noopener noreferrer">
          <div class="alerts-row alert-none" id="alerts-row">
            <div class="alerts-indicator alert-none-icon" id="alerts-indicator"></div>
            <div class="alerts-text">
              <div class="alerts-title" id="alerts-title">No alerts in effect</div>
              <div class="alerts-sub" id="alerts-sub"></div>
            </div>
          </div>
        </a>
      </div>

      <div class="stat slot-sunset">
        <div class="stat-label">Sunset</div>
        <div class="stat-value" id="sunset">--:--</div>
        <div class="stat-sub">Local time</div>
      </div>

      <div class="stat slot-humidity">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
        <div class="stat-sub">Current</div>
      </div>
    </div>

    <div class="forecast" id="forecast"></div>
  </div>

  <script>
    const LAT = 48.4621;
    const LON = -123.4689;
    const TZ = 'America/Vancouver';
    const AQHI_RADIUS_KM = 5;
    const POLLUTANT_STORAGE_KEY = 'maplebox_weather_last_pollutant_v1';

    const ALERTS_URL = 'https://weather.gc.ca/warnings/report_e.html?bc43=';

    const WEATHER_URL =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${LAT}` +
      `&longitude=${LON}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day,precipitation_probability,uv_index` +
      `&hourly=weather_code,is_day` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunset` +
      `&timezone=${encodeURIComponent(TZ)}` +
      `&forecast_days=5` +
      `&cell_selection=land`;

    const AQHI_OBS_API_URL =
      `https://api.weather.gc.ca/collections/aqhi-observations-realtime/items?f=json&bbox=-123.72,48.28,-123.22,48.62&limit=200`;

    const AQHI_PAGE_MAP = {
      westshore: 'https://r.jina.ai/http://weather.gc.ca/airquality/pages/bcaq-015_e.html',
      victoria_saanich: 'https://r.jina.ai/http://weather.gc.ca/airquality/pages/bcaq-010_e.html'
    };

    const TWN_AIR_PROXY_URL = 'https://r.jina.ai/http://www.theweathernetwork.com/en/city/ca/british-columbia/victoria/air-quality';
    const IQAIR_VICTORIA_PROXY_URL = 'https://r.jina.ai/http://www.iqair.com/ca/canada/british-columbia/victoria';
    const AQICN_VICTORIA_PROXY_URL = 'https://r.jina.ai/http://aqicn.org/city/british-comlumbia/victoria-topaz/';
    const ALERTS_PROXY_URL = 'https://r.jina.ai/http://weather.gc.ca/warnings/report_e.html?bc43=';

    const FETCH_TIMEOUT_MS = 9000;

    const el = (id) => document.getElementById(id);

    const POLLUTANT_META = {
      particles: { label: 'Particles', desc: 'Smoke, dust, soot' },
      ozone: { label: 'Ozone (O₃)', desc: 'Smog / sunny pollution' },
      no2: { label: 'NO₂', desc: 'Traffic / fuel exhaust' },
      unknown: { label: 'Cause unknown', desc: 'No clear pollutant posted' }
    };

    function roundTemp(value) {
      return `${Math.round(value)}°`;
    }

    function formatShortTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString('en-CA', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: TZ
      })
      .replace(/\s*p\.m\./i, 'p')
      .replace(/\s*a\.m\./i, 'a')
      .replace(/\s*pm/i, 'p')
      .replace(/\s*am/i, 'a')
      .replace(/\s+/g, '')
      .toLowerCase();
    }

    function formatUpdated(timestamp = new Date()) {
      return new Date(timestamp).toLocaleString('en-CA', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: TZ
      }).replace(',', '');
    }

    function formatDayName(isoDate) {
      return new Date(`${isoDate}T12:00:00`).toLocaleDateString('en-CA', {
        weekday: 'short',
        timeZone: TZ
      });
    }

    function formatDayDate(isoDate) {
      return new Date(`${isoDate}T12:00:00`).toLocaleDateString('en-CA', {
        month: 'short',
        day: 'numeric',
        timeZone: TZ
      });
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function compassDirection(deg) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      return dirs[Math.round((((deg % 360) + 360) % 360) / 45) % 8];
    }

    function getWindClass(speed) {
      if (!Number.isFinite(speed) || speed <= 0) return '';
      if (speed < 15) return 'wind-low';
      if (speed < 30) return 'wind-moderate';
      if (speed < 50) return 'wind-high';
      return 'wind-veryhigh';
    }

    function getAqhiClass(value) {
      if (!Number.isFinite(value) || value <= 1) return '';
      if (value <= 3) return 'aqhi-low';
      if (value <= 6) return 'aqhi-moderate';
      if (value <= 9) return 'aqhi-high';
      return 'aqhi-veryhigh';
    }

    function getUvClass(value) {
      if (!Number.isFinite(value) || value <= 0) return '';
      if (value < 3) return 'uv-low';
      if (value < 6) return 'uv-moderate';
      if (value < 8) return 'uv-high';
      return 'uv-veryhigh';
    }

    function formatAqhiValue(value) {
      if (!Number.isFinite(value)) return '—';
      return value >= 10 ? '10+' : String(Math.round(value));
    }

    function aqhiRiskLabel(value) {
      if (!Number.isFinite(value)) return 'Unavailable';
      if (value <= 3) return 'Low';
      if (value <= 6) return 'Moderate';
      if (value <= 9) return 'High';
      return 'Very High';
    }

    function iconUrl(name) {
      return `https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/${name}.svg`;
    }

    function weatherMeta(code, isDay = true) {
      if (code === 0) return { text: 'Clear', icon: isDay ? 'clear-day' : 'clear-night' };
      if ([1, 2].includes(code)) return { text: 'Partly cloudy', icon: isDay ? 'partly-cloudy-day' : 'partly-cloudy-night' };
      if (code === 3) return { text: 'Overcast', icon: 'overcast' };
      if ([45, 48].includes(code)) return { text: 'Fog', icon: 'fog' };
      if ([51, 53, 55, 56, 57].includes(code)) return { text: 'Drizzle', icon: 'drizzle' };
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { text: 'Rain', icon: 'rain' };
      if ([71, 73, 75, 77, 85, 86].includes(code)) return { text: 'Snow', icon: 'snow' };
      if ([95, 96, 99].includes(code)) return { text: 'Storm', icon: 'thunderstorms-rain' };
      return { text: 'Overcast', icon: 'overcast' };
    }

    function getStoredPollutant() {
      try {
        const value = localStorage.getItem(POLLUTANT_STORAGE_KEY);
        return value && POLLUTANT_META[value] ? value : null;
      } catch {
        return null;
      }
    }

    function storePollutant(key) {
      try {
        if (key && key !== 'unknown') {
          localStorage.setItem(POLLUTANT_STORAGE_KEY, key);
        }
      } catch {}
    }

    async function fetchWithTimeout(url, responseType = 'json') {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const res = await fetch(url, { cache: 'no-store', signal: controller.signal });
        if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
        return responseType === 'text' ? await res.text() : await res.json();
      } finally {
        clearTimeout(timeout);
      }
    }

    const fetchText = (url) => fetchWithTimeout(url, 'text');
    const fetchJson = (url) => fetchWithTimeout(url, 'json');

    function proxifyForJina(url) {
      return `https://r.jina.ai/http://${String(url).replace(/^https?:\/\//i, '')}`;
    }

    function setWind(speed, gust, dirDeg) {
      const windStat = el('wind-stat');
      windStat.className = 'stat slot-wind';
      const windClass = getWindClass(speed);
      if (windClass) windStat.classList.add(windClass);

      el('wind-main').textContent = `${Math.round(speed)}`;
      el('wind-dir').textContent = compassDirection(dirDeg);
      el('wind-sub').textContent =
        gust && gust >= speed + 3 ? `Gust ${Math.round(gust)} km/h`
        : speed < 5 ? 'Calm'
        : 'Steady';
    }

    function setUv(uvNow) {
      const uvStat = el('uv-stat');
      uvStat.className = 'stat slot-uv uv-center';
      const uvClass = getUvClass(uvNow);
      if (uvClass) uvStat.classList.add(uvClass);
      el('uv-value').textContent = Number.isFinite(uvNow) ? String(Math.round(uvNow * 10) / 10) : '—';
    }

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function mapFeature(feature) {
      const coords = feature?.geometry?.coordinates || [];
      const lon = Number(coords[0]);
      const lat = Number(coords[1]);
      const name = String(feature?.properties?.location_name_en || '');
      const distance = Number.isFinite(lat) && Number.isFinite(lon)
        ? distanceKm(LAT, LON, lat, lon)
        : Number.POSITIVE_INFINITY;

      return { feature, lat, lon, name, nameLower: name.toLowerCase(), distance };
    }

    function pickAqhiFeature(features) {
      if (!Array.isArray(features) || !features.length) return null;
      const mapped = features.map(mapFeature);

      const westshore = mapped.find(x => x.nameLower.includes('westshore'));
      if (westshore) return westshore;

      const victoriaSaanich = mapped.find(x =>
        x.nameLower.includes('victoria/saanich') ||
        (x.nameLower.includes('victoria') && x.nameLower.includes('saanich'))
      );
      if (victoriaSaanich) return victoriaSaanich;

      return mapped
        .filter(x => x.distance <= AQHI_RADIUS_KM)
        .sort((a, b) => a.distance - b.distance)[0] || null;
    }

    function getAqhiPageUrl(nameLower) {
      if (nameLower.includes('westshore')) return AQHI_PAGE_MAP.westshore;
      if (nameLower.includes('victoria/saanich') || (nameLower.includes('victoria') && nameLower.includes('saanich'))) {
        return AQHI_PAGE_MAP.victoria_saanich;
      }
      return null;
    }

    function classifyPollutantFromText(text) {
      const lower = String(text || '').toLowerCase();

      if (lower.includes('primary pollutant') && (lower.includes('pm2.5') || lower.includes('pm 2.5'))) return 'particles';
      if (lower.includes('primary pollutant') && (lower.includes('ozone') || lower.includes('o₃') || lower.includes('o3'))) return 'ozone';
      if (lower.includes('primary pollutant') && (lower.includes('nitrogen dioxide') || lower.includes('no₂') || lower.includes('no2'))) return 'no2';

      if (lower.includes('pm2.5') || lower.includes('pm 2.5') || lower.includes('fine particles') || lower.includes('particulate matter')) return 'particles';
      if (lower.includes('ground-level ozone') || lower.includes('ozone (o₃)') || lower.includes('ozone (o3)') || lower.includes('o3 aqi') || lower.includes('ozone')) return 'ozone';
      if (lower.includes('nitrogen dioxide') || lower.includes('no₂') || lower.includes('no2')) return 'no2';

      return null;
    }

    function tryInferPollutantByValues(text) {
      const lower = String(text || '').toLowerCase();

      const pmMatch = lower.match(/pm2\.?5[^0-9]{0,30}([0-9]+(?:\.[0-9]+)?)/i);
      const o3Match = lower.match(/(?:o₃|o3|ozone)[^0-9]{0,30}([0-9]+(?:\.[0-9]+)?)/i);
      const no2Match = lower.match(/(?:no₂|no2|nitrogen dioxide)[^0-9]{0,30}([0-9]+(?:\.[0-9]+)?)/i);

      const values = [
        { key: 'particles', value: pmMatch ? Number(pmMatch[1]) : NaN },
        { key: 'ozone', value: o3Match ? Number(o3Match[1]) : NaN },
        { key: 'no2', value: no2Match ? Number(no2Match[1]) : NaN }
      ].filter(x => Number.isFinite(x.value));

      if (!values.length) return null;
      values.sort((a, b) => b.value - a.value);
      return values[0].key || null;
    }

    function setAirCard(aqhiData) {
      const aqhiStat = el('aqhi-stat');
      aqhiStat.className = 'stat air-quality slot-air';

      const currentValue = Number(aqhiData?.value);
      const aqClass = getAqhiClass(currentValue);
      if (aqClass) aqhiStat.classList.add(aqClass);

      el('aqhi-risk').textContent = Number.isFinite(currentValue) ? aqhiRiskLabel(currentValue) : 'Unavailable';
      el('aqhi-badge').textContent = Number.isFinite(currentValue) ? formatAqhiValue(currentValue) : '—';
    }

    function setDescriptorContent(aqhiData, alerts) {
      const items = [];

      if (alerts && alerts.count > 0) {
        items.push(`
          <div class="descriptor-item">
            <div class="descriptor-title">Weather • ${escapeHtml(alerts.weatherType || 'Weather')}</div>
            <div class="descriptor-sub">${escapeHtml(alerts.summaryShort || alerts.headline || 'Active alert')}</div>
          </div>
        `);
      }

      const meta = POLLUTANT_META[aqhiData?.pollutantKey || 'unknown'];

      if (items.length) items.push('<div class="descriptor-sep"></div>');

      items.push(`
        <div class="descriptor-item">
          <div class="descriptor-title">Air • ${escapeHtml(meta.label)}</div>
          <div class="descriptor-sub">${escapeHtml(meta.desc)}</div>
        </div>
      `);

      el('descriptor-space').innerHTML = items.join('');
    }

    function getDominantDayWeatherMeta(hourly, date) {
      if (!hourly?.time || !hourly?.weather_code) return weatherMeta(3, true);

      const start = `${date}T06:00`;
      const end = `${date}T18:00`;
      const counts = new Map();

      for (let i = 0; i < hourly.time.length; i++) {
        const t = String(hourly.time[i]);
        if (t >= start && t <= end) {
          const code = Number(hourly.weather_code[i]);
          counts.set(code, (counts.get(code) || 0) + 1);
        }
      }

      if (!counts.size) return weatherMeta(3, true);

      let bestCode = 3;
      let bestCount = -1;
      for (const [code, count] of counts.entries()) {
        if (count > bestCount) {
          bestCode = code;
          bestCount = count;
        }
      }

      return weatherMeta(bestCode, true);
    }

    function renderForecast(daily, hourly) {
      el('forecast').innerHTML = daily.time.map((date, i) => {
        const meta = getDominantDayWeatherMeta(hourly, date);
        const precip = daily.precipitation_probability_max?.[i];
        return `
          <div class="forecast-day">
            <div class="forecast-name">${formatDayName(date)}</div>
            <div class="forecast-date">${formatDayDate(date)}</div>
            <div class="forecast-icon-wrap"><img alt="${escapeHtml(meta.text)}" src="${iconUrl(meta.icon)}" /></div>
            <div class="forecast-condition">${escapeHtml(meta.text)}</div>
            <div class="forecast-divider"></div>
            <div class="forecast-high">${Math.round(daily.temperature_2m_max[i])}°</div>
            <div class="forecast-night">Night ${Math.round(daily.temperature_2m_min[i])}°</div>
            <div class="forecast-precip">${typeof precip === 'number' ? `💧 ${Math.round(precip)}%` : '&nbsp;'}</div>
          </div>
        `;
      }).join('');
    }

    function normalizeAlertText(text) {
      return String(text || '')
        .replace(/\r/g, '\n')
        .replace(/\u00a0/g, ' ')
        .replace(/[ \t]+/g, ' ')
        .replace(/\n{3,}/g, '\n\n');
    }

    function cleanAlertText(text) {
      return String(text || '')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/gi, '$1')
        .replace(/https?:\/\/\S+/gi, ' ')
        .replace(/\*\*/g, ' ')
        .replace(/^#{1,6}\s*/gm, '')
        .replace(/^[ \t]*[-•]\s*/gm, '')
        .replace(/[ \t]+/g, ' ')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function cleanSingleLine(text) {
      return String(text || '')
        .replace(/\*\*/g, ' ')
        .replace(/^#{1,6}\s*/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function extractAlertLinks(summaryText) {
      const matches = [...String(summaryText || '').matchAll(/\[([^\]]*(?:warning|watch|advisory|statement)[^\]]*)\]\((https?:\/\/[^)]+)\)/gi)];
      return matches.map(m => ({
        text: cleanSingleLine(m[1]),
        url: m[2]
      }));
    }

    function pickBestAlertLink(links) {
      if (!Array.isArray(links) || !links.length) return null;

      const scored = links.map(link => {
        const lower = `${link.text} ${link.url}`.toLowerCase();
        let score = 0;

        if (lower.includes('greater victoria')) score += 120;
        if (lower.includes('south vancouver island')) score += 70;
        if (lower.includes('victoria')) score += 40;
        if (lower.includes('warning')) score += 25;
        if (lower.includes('watch')) score += 20;
        if (lower.includes('advisory')) score += 15;
        if (lower.includes('statement')) score += 10;

        return { ...link, score };
      });

      scored.sort((a, b) => b.score - a.score);
      return scored[0];
    }

    function extractCoreHeadline(text) {
      const source = cleanSingleLine(text);

      const patterns = [
        /Red Warning - [A-Za-z ]+/i,
        /Orange Warning - [A-Za-z ]+/i,
        /Yellow Warning - [A-Za-z ]+/i,
        /Special Weather Statement/i,
        /Snowfall Warning/i,
        /Rainfall Warning/i,
        /Wind Warning/i,
        /Fog Advisory/i,
        /Heat Warning/i,
        /Cold Warning/i,
        /Thunderstorm Watch/i,
        /Severe Thunderstorm Warning/i,
        /Winter Storm Warning/i,
        /Weather Advisory/i,
        /Air Quality Statement/i
      ];

      for (const pattern of patterns) {
        const match = source.match(pattern);
        if (match) return match[0];
      }

      const generic = source.match(/[A-Z][A-Za-z/\- ]+(Warning|Watch|Advisory|Statement)/);
      return generic ? cleanSingleLine(generic[0]) : source;
    }

    function getAlertSeverity(headline) {
      if (/warning/i.test(headline)) return 'warning';
      if (/watch|advisory|statement/i.test(headline)) return 'watch';
      return 'watch';
    }

    function getAlertLevel(headline, detailText = '') {
      const lower = `${headline} ${detailText}`.toLowerCase();

      if (lower.includes('red warning')) return 'red';
      if (lower.includes('orange warning') || lower.includes('orange watch') || lower.includes('orange advisory')) return 'orange';
      if (lower.includes('yellow warning') || lower.includes('yellow watch') || lower.includes('yellow advisory') || lower.includes('yellow statement')) return 'yellow';

      if (lower.includes('warning')) return 'red';
      if (lower.includes('watch') || lower.includes('advisory')) return 'orange';
      if (lower.includes('statement')) return 'yellow';

      return 'yellow';
    }

    function getWeatherType(headline, detailText = '') {
      const lower = `${headline} ${detailText}`.toLowerCase();

      if (lower.includes('wind')) return 'Wind';
      if (lower.includes('thunder')) return 'Thunderstorm';
      if (lower.includes('storm')) return 'Storm';
      if (lower.includes('snow')) return 'Snow';
      if (lower.includes('rain')) return 'Rain';
      if (lower.includes('fog')) return 'Fog';
      if (lower.includes('heat')) return 'Heat';
      if (lower.includes('cold') || lower.includes('freeze') || lower.includes('arctic')) return 'Cold';
      if (lower.includes('air quality')) return 'Air Quality';
      if (lower.includes('special weather statement')) return 'Special Statement';
      if (/warning/i.test(headline)) return 'Warning';
      if (/watch/i.test(headline)) return 'Watch';
      if (/advisory/i.test(headline)) return 'Advisory';
      return 'Weather';
    }

    function extractSection(detailText, sectionName) {
      const cleaned = normalizeAlertText(detailText);
      const regex = new RegExp(`${sectionName}:\\s*([\\s\\S]*?)(?=\\n\\s*(?:What|When|Impacts?|Hazards?|Remarks?|Additional information|###|$):|$)`, 'i');
      const match = cleaned.match(regex);
      if (!match) return '';

      return match[1]
        .split('\n')
        .map(line => line.replace(/^[ \t]*[-•]\s*/, '').trim())
        .filter(Boolean)
        .join(' ');
    }

    function shortenSentence(text, maxLen = 95) {
      const cleaned = cleanSingleLine(text).replace(/\.+$/,'');
      if (!cleaned) return '';
      if (cleaned.length <= maxLen) return cleaned;
      const cut = cleaned.slice(0, maxLen);
      const lastSpace = cut.lastIndexOf(' ');
      return `${(lastSpace > 50 ? cut.slice(0, lastSpace) : cut).trim()}…`;
    }

    function buildAlertSummary(detailText, headline) {
      const what = extractSection(detailText, 'What');
      const when = extractSection(detailText, 'When');
      const impacts = extractSection(detailText, 'Impacts');

      const parts = [];
      if (what) parts.push(shortenSentence(what, 80));
      if (when) parts.push(shortenSentence(when, 70));
      if (impacts) parts.push(shortenSentence(impacts, 95));

      if (parts.length) return parts.join(' • ');
      return shortenSentence(headline, 120);
    }

    function parseAlertsFromSummaryOnly(summaryText) {
      const normalized = normalizeAlertText(summaryText);

      if (/No alerts in effect/i.test(normalized)) {
        return {
          count: 0,
          severity: 'none',
          level: 'none',
          headline: 'No alerts in effect',
          shortLabel: '',
          weatherType: '',
          summaryShort: '',
          detailUrl: ALERTS_URL
        };
      }

      const links = extractAlertLinks(normalized);
      const picked = pickBestAlertLink(links);
      if (!picked) {
        return {
          count: 0,
          severity: 'none',
          level: 'none',
          headline: 'No alerts in effect',
          shortLabel: '',
          weatherType: '',
          summaryShort: '',
          detailUrl: ALERTS_URL
        };
      }

      const headline = extractCoreHeadline(picked.text);
      const severity = getAlertSeverity(headline);
      const level = getAlertLevel(headline, picked.text);
      const weatherType = getWeatherType(headline, picked.text);

      return {
        count: 1,
        severity,
        level,
        headline,
        shortLabel: weatherType,
        weatherType,
        summaryShort: shortenSentence(cleanSingleLine(picked.text), 120),
        detailUrl: picked.url || ALERTS_URL
      };
    }

    async function loadAlerts() {
      try {
        const summaryText = await fetchText(ALERTS_PROXY_URL);
        const baseAlert = parseAlertsFromSummaryOnly(summaryText);

        if (baseAlert.count === 0 || !baseAlert.detailUrl) {
          return baseAlert;
        }

        try {
          const detailText = await fetchText(proxifyForJina(baseAlert.detailUrl));
          const headline = extractCoreHeadline(`${baseAlert.headline} ${detailText}`);
          const severity = getAlertSeverity(headline);
          const level = getAlertLevel(headline, detailText);
          const weatherType = getWeatherType(headline, detailText);
          const summaryShort = buildAlertSummary(detailText, headline);

          return {
            ...baseAlert,
            severity,
            level,
            headline,
            weatherType,
            shortLabel: weatherType,
            summaryShort,
            detailUrl: baseAlert.detailUrl
          };
        } catch {
          return baseAlert;
        }
      } catch {
        return { status: 'error', count: 0 };
      }
    }

    function setAlertIndicator(level) {
      const indicator = el('alerts-indicator');
      indicator.className = 'alerts-indicator';

      if (level === 'yellow') {
        indicator.classList.add('alert-yellow-icon');
        return;
      }
      if (level === 'orange') {
        indicator.classList.add('alert-orange-icon');
        return;
      }
      if (level === 'red') {
        indicator.classList.add('alert-red-icon');
        return;
      }

      indicator.classList.add('alert-none-icon');
    }

    function setAlertsBar(alerts) {
      const row = el('alerts-row');
      el('alerts-link').href = alerts?.detailUrl || ALERTS_URL;
      row.className = 'alerts-row';

      if (!alerts || alerts.status === 'error') {
        row.classList.add('alert-none');
        setAlertIndicator('none');
        el('alerts-title').textContent = 'No alerts in effect';
        el('alerts-sub').textContent = '';
        return;
      }

      if (alerts.count === 0) {
        row.classList.add('alert-none');
        setAlertIndicator('none');
        el('alerts-title').textContent = 'No alerts in effect';
        el('alerts-sub').textContent = '';
        return;
      }

      if (alerts.level === 'red') row.classList.add('alert-red');
      else if (alerts.level === 'orange') row.classList.add('alert-orange');
      else row.classList.add('alert-yellow');

      setAlertIndicator(alerts.level);
      el('alerts-title').textContent = alerts.headline || 'Active weather alert';
      el('alerts-sub').textContent = 'Click For Full Details';
    }

    async function loadAqhi() {
      try {
        const obsData = await fetchJson(AQHI_OBS_API_URL);
        const pickedObs = pickAqhiFeature(obsData?.features || []);
        let pollutantKey = null;

        if (pickedObs) {
          const tasks = [];
          const ecUrl = getAqhiPageUrl(pickedObs.nameLower);
          if (ecUrl) tasks.push(fetchText(ecUrl).catch(() => ''));

          tasks.push(fetchText(TWN_AIR_PROXY_URL).catch(() => ''));
          tasks.push(fetchText(IQAIR_VICTORIA_PROXY_URL).catch(() => ''));
          tasks.push(fetchText(AQICN_VICTORIA_PROXY_URL).catch(() => ''));

          const texts = await Promise.all(tasks);

          for (const text of texts) {
            pollutantKey = classifyPollutantFromText(text) || tryInferPollutantByValues(text);
            if (pollutantKey) break;
          }

          if (!pollutantKey) pollutantKey = getStoredPollutant() || 'unknown';
          else storePollutant(pollutantKey);

          const obsProps = pickedObs.feature?.properties || {};
          const obsValue = Number(obsProps.aqhi);

          return {
            value: Number.isFinite(obsValue) ? Math.round(obsValue) : null,
            pollutantKey
          };
        }

        return { value: null, pollutantKey: getStoredPollutant() || 'unknown' };
      } catch {
        return { value: null, pollutantKey: getStoredPollutant() || 'unknown' };
      }
    }

    async function loadWeather() {
      return fetchJson(WEATHER_URL);
    }

    function applyWeather(weather) {
      const current = weather.current;
      const daily = weather.daily;
      const hourly = weather.hourly;
      const currentMeta = weatherMeta(current.weather_code, Boolean(current.is_day));

      el('title').textContent = 'View Royal';
      el('updated').textContent = `Updated ${formatUpdated()}`;
      el('temp').textContent = roundTemp(current.temperature_2m);
      el('temp-icon').src = iconUrl(currentMeta.icon);
      el('temp-icon').alt = currentMeta.text;
      el('condition').textContent = currentMeta.text;

      const precipProb = current.precipitation_probability;
      el('precip').textContent = (typeof precipProb === 'number' && precipProb >= 15)
        ? `Rain ${Math.round(precipProb)}%`
        : '';

      el('feels').textContent = `Feels ${roundTemp(current.apparent_temperature)}`;
      el('high-low-inline').textContent = `H: ${Math.round(daily.temperature_2m_max[0])}°   L: ${Math.round(daily.temperature_2m_min[0])}°`;
      el('humidity').textContent = `${Math.round(current.relative_humidity_2m)}%`;
      el('sunset').textContent = formatShortTime(daily.sunset[0]);

      setWind(current.wind_speed_10m, current.wind_gusts_10m, current.wind_direction_10m);
      setUv(current.uv_index);
      renderForecast(daily, hourly);
    }

    async function loadLiveWidget() {
      try {
        const weather = await loadWeather();
        applyWeather(weather);

        const [aqhi, alerts] = await Promise.allSettled([loadAqhi(), loadAlerts()]);

        const aqhiData = aqhi.status === 'fulfilled'
          ? aqhi.value
          : { value: null, pollutantKey: getStoredPollutant() || 'unknown' };

        const alertsData = alerts.status === 'fulfilled'
          ? alerts.value
          : { status: 'error', count: 0 };

        setAirCard(aqhiData);
        setAlertsBar(alertsData);
        setDescriptorContent(aqhiData, alertsData);
      } catch (error) {
        console.error(error);
        el('updated').textContent = 'Live widget failed to load';
        el('condition').textContent = 'Preview error';
        setAlertsBar({ status: 'error' });
      }
    }

    loadLiveWidget();
  </script>
</body>
</html>
