<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapleBox Weather Combined</title>
  <script type="text/javascript" src="https://me.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=2yuuz2GiItYnDiT07Q8j240XdInaVBP_Ghd2308WnQkzmv_HcqoLZZ7kXF-DZwLYg8-zGnnW0mrELi8etEWUnlpLDkKxBY7cJekDbPgpWo489CdQ_o2Q7JBOptkM3w4VrUu2zwuyv3xwy7bgb8z9frkIx1nXgSwDLvkJFloAgMhVvEbS26SA75ZQJtdQhq8JcqVR-quOLTxg4tOKuZsebsm6_UxGqVIKE43d9MYnDuc4Emc_FW4UH25Io-57-sV0FxcrdajtdqwqpKrmG8w5AA" charset="UTF-8"></script><style>
    :root{
      --bg:#071726;
      --panel:#0b2137;
      --panel-2:#0d2741;
      --panel-3:#102d49;
      --line:rgba(174,214,255,.14);
      --line-2:rgba(174,214,255,.10);
      --text:#edf7ff;
      --muted:#a8c2d9;
      --soft:#89aeca;
      --blue:#5bb8ff;
      --good:#6fd38e;
      --mod:#f1cd58;
      --high:#f2994a;
      --vhigh:#eb5757;
      --shadow:0 10px 24px rgba(0,0,0,.18);
      --r-lg:18px;
      --r-md:14px;
      --r-sm:12px;
      --gap:10px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:transparent;color:var(--text);font-family:"Segoe UI",Inter,Arial,sans-serif}
    body{min-height:100vh}

    .widget{
      width:100%;
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(65,132,202,.22), transparent 32%),
        linear-gradient(180deg, #0a1d31 0%, #081829 100%);
      padding:12px;
      overflow:hidden;
    }

    .top{
      display:grid;
      grid-template-columns:minmax(0,1.45fr) minmax(250px,.9fr);
      gap:12px;
      align-items:start;
      min-height:208px;
    }

    .hero{
      padding:6px 2px 0 2px;
      min-width:0;
    }

    .place{font-size:25px;font-weight:800;letter-spacing:.2px;line-height:1.1}
    .updated{margin-top:4px;font-size:12px;color:var(--muted);letter-spacing:.25px}

    .hero-main{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      margin-top:10px;
    }

    .temp-block{min-width:0}
    .current-temp{
      font-size:70px;
      font-weight:900;
      line-height:.92;
      letter-spacing:-1.8px;
      text-shadow:0 3px 18px rgba(0,0,0,.18);
    }
    .condition{margin-top:8px;font-size:24px;font-weight:700;line-height:1.1}
    .meta{margin-top:7px;display:flex;flex-wrap:wrap;gap:8px 14px;color:var(--muted);font-size:15px;font-weight:600}
    .hero-icon-wrap{display:flex;align-items:center;justify-content:center;min-width:112px}
    .hero-icon{font-size:84px;line-height:1;filter:drop-shadow(0 6px 12px rgba(0,0,0,.2))}

    .descriptor-stack{
      display:flex;
      flex-direction:column;
      gap:9px;
      padding-top:8px;
      min-height:182px;
      justify-content:flex-start;
    }

    .descriptor{
      background:linear-gradient(180deg, rgba(18,48,79,.55), rgba(12,35,57,.35));
      border:1px solid var(--line-2);
      border-radius:16px;
      padding:12px 14px;
      min-height:74px;
      backdrop-filter:blur(4px);
    }

    .descriptor.hidden{display:none}
    .descriptor-title{font-size:16px;font-weight:800;line-height:1.2}
    .descriptor-body{margin-top:4px;font-size:13px;line-height:1.35;color:var(--muted)}
    .descriptor-divider{
      height:1px;
      margin:0 8px;
      background:linear-gradient(90deg, transparent, rgba(167,210,247,.2), transparent);
      display:none;
    }
    .descriptor-divider.show{display:block}

    .mid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      grid-template-areas:
        "wind air sunset uv"
        "alert alert alert humidity";
      gap:10px;
      align-items:stretch;
    }

    .card{
      background:linear-gradient(180deg, rgba(15,43,70,.95), rgba(10,30,49,.97));
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      min-width:0;
    }

    .stat{padding:11px 12px 12px 12px; min-height:98px; display:flex; flex-direction:column; justify-content:space-between}
    .stat-label{font-size:13px;font-weight:800;color:#d7ecff;letter-spacing:.25px}
    .stat-value{margin-top:8px;font-size:28px;font-weight:900;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-sub{margin-top:6px;font-size:13px;color:var(--muted);font-weight:600;line-height:1.25}

    #card-wind{grid-area:wind}
    #card-air{grid-area:air}
    #card-sunset{grid-area:sunset}
    #card-uv{grid-area:uv; min-height:84px}
    #card-humidity{grid-area:humidity}

    .aqhi-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      height:34px;
      padding:0 11px;
      border-radius:999px;
      font-size:18px;
      font-weight:900;
      color:#071726;
      margin-right:8px;
      vertical-align:middle;
    }

    .alert-link{
      grid-area:alert;
      display:flex;
      align-items:center;
      min-height:98px;
      text-decoration:none;
      color:inherit;
    }

    .alert-card{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(14,41,66,.96), rgba(9,28,46,.98));
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      transition:transform .14s ease, border-color .14s ease, background .14s ease;
    }

    .alert-link:hover .alert-card{
      transform:translateY(-1px);
      border-color:rgba(132,193,255,.28);
      background:linear-gradient(180deg, rgba(16,46,74,.98), rgba(10,31,50,1));
    }

    .alert-text{min-width:0; display:flex; flex-direction:column; justify-content:center}
    .alert-main{font-size:21px; font-weight:850; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .alert-sub{margin-top:5px; font-size:13px; color:var(--muted); font-weight:700; min-height:17px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .alert-cta{font-size:14px; font-weight:800; color:#dff1ff; white-space:nowrap; flex-shrink:0}

    .forecast{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;
    }

    .forecast-card{
      background:linear-gradient(180deg, rgba(14,39,64,.92), rgba(9,26,42,.96));
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 10px 11px;
      text-align:center;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .fc-day{font-size:14px;font-weight:850}
    .fc-date{margin-top:2px;font-size:11px;color:var(--muted);font-weight:700}
    .fc-icon{margin-top:8px;font-size:33px;line-height:1}
    .fc-cond{margin-top:7px;font-size:12px;font-weight:700;min-height:30px;line-height:1.2;color:#e3f2ff}
    .fc-divider{height:1px;margin:8px 8px;background:linear-gradient(90deg, transparent, rgba(167,210,247,.22), transparent)}
    .fc-high{font-size:22px;font-weight:900;line-height:1}
    .fc-low{margin-top:3px;font-size:13px;color:var(--muted);font-weight:700}
    .fc-pop{margin-top:8px;font-size:12px;color:#acd4ff;font-weight:800}

    .loading,.error{
      display:flex;align-items:center;justify-content:center;min-height:60vh;
      color:var(--muted);font-weight:700;font-size:15px;text-align:center;padding:20px;
    }

    @media (max-width: 980px){
      .top{grid-template-columns:1fr}
      .descriptor-stack{min-height:unset;padding-top:0}
      .mid{
        grid-template-columns:repeat(2,minmax(0,1fr));
        grid-template-areas:
          "wind air"
          "sunset uv"
          "alert alert"
          "humidity humidity";
      }
      .forecast{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width: 640px){
      .widget{padding:10px}
      .hero-main{grid-template-columns:1fr}
      .hero-icon-wrap{justify-content:flex-start}
      .current-temp{font-size:58px}
      .condition{font-size:21px}
      .mid{grid-template-columns:1fr;grid-template-areas:"wind" "air" "sunset" "uv" "humidity" "alert"}
      .forecast{grid-template-columns:repeat(2,minmax(0,1fr))}
      .alert-card{flex-direction:column;align-items:flex-start}
      .alert-cta{padding-top:2px}
    }
  </style>
</head>
<body>
  <div class="widget" id="app">
    <div class="loading">Loading weather…</div>
  </div>

  <script>
    const LAT = 48.4621;
    const LON = -123.4689;
    const TZ = 'America/Vancouver';
    const ALERTS_PAGE = 'https://weather.gc.ca/warnings/report_e.html?bc43=';
    const ALERTS_FEED = 'https://weather.gc.ca/rss/battleboard/bc43_e.xml';
    const AQHI_CSV = 'https://dd.weather.gc.ca/today/air_quality/aqhi/pyr/observation/realtime/csv';

    const AQHI_PREFERRED_STATIONS = [
      { name: 'WestShore', lat: 48.4487, lon: -123.5043 },
      { name: 'Victoria/Saanich', lat: 48.4579, lon: -123.3764 }
    ];

    const app = document.getElementById('app');

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function proxied(url) {
      return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Request failed: ${res.status}`);
      return res.json();
    }

    async function fetchText(url) {
      const res = await fetch(proxied(url), { cache: 'no-store' });
      if (!res.ok) throw new Error(`Request failed: ${res.status}`);
      return res.text();
    }

    function kmBetween(aLat, aLon, bLat, bLon) {
      const R = 6371;
      const dLat = (bLat - aLat) * Math.PI / 180;
      const dLon = (bLon - aLon) * Math.PI / 180;
      const s1 = Math.sin(dLat / 2);
      const s2 = Math.sin(dLon / 2);
      const aa = s1 * s1 + Math.cos(aLat * Math.PI / 180) * Math.cos(bLat * Math.PI / 180) * s2 * s2;
      return 2 * R * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
    }

    function formatUpdated(date = new Date()) {
      return `Updated ${date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
    }

    function formatTime(dateLike) {
      const d = new Date(dateLike);
      return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function formatDayName(dateLike) {
      return new Date(dateLike).toLocaleDateString([], { weekday: 'short' });
    }

    function formatShortDate(dateLike) {
      return new Date(dateLike).toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    function iconForCode(code, isDay = 1) {
      const day = !!isDay;
      const map = {
        0: day ? '☀️' : '🌙',
        1: day ? '🌤️' : '🌙',
        2: day ? '⛅' : '☁️',
        3: '☁️',
        45: '🌫️',
        48: '🌫️',
        51: '🌦️',
        53: '🌦️',
        55: '🌧️',
        56: '🌧️',
        57: '🌧️',
        61: '🌦️',
        63: '🌧️',
        65: '🌧️',
        66: '🌨️',
        67: '🌨️',
        71: '🌨️',
        73: '❄️',
        75: '❄️',
        77: '🌨️',
        80: '🌦️',
        81: '🌧️',
        82: '🌧️',
        85: '🌨️',
        86: '❄️',
        95: '⛈️',
        96: '⛈️',
        99: '⛈️'
      };
      return map[code] || '🌡️';
    }

    function conditionForCode(code) {
      const map = {
        0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Cloudy',45:'Fog',48:'Depositing rime fog',
        51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',56:'Freezing drizzle',57:'Heavy freezing drizzle',
        61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',
        71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Rain showers',81:'Heavy showers',
        82:'Violent rain',85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm with hail',99:'Severe thunderstorm'
      };
      return map[code] || 'Conditions unavailable';
    }

    function aqhiRisk(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return { label:'Unavailable', color:'#8fb3d1' };
      if (n <= 3) return { label:'Low', color:'#6fd38e' };
      if (n <= 6) return { label:'Moderate', color:'#f1cd58' };
      if (n <= 10) return { label:'High', color:'#f2994a' };
      return { label:'Very High', color:'#eb5757' };
    }

    function uvRisk(uv) {
      const n = Number(uv);
      if (!Number.isFinite(n)) return { label:'Unavailable', color:'#8fb3d1' };
      if (n < 3) return { label:'Low', color:'#6fd38e' };
      if (n < 6) return { label:'Moderate', color:'#f1cd58' };
      if (n < 8) return { label:'High', color:'#f2994a' };
      if (n < 11) return { label:'Very High', color:'#eb5757' };
      return { label:'Extreme', color:'#eb5757' };
    }

    function parseCSV(text) {
      const rows = [];
      let current = '';
      let row = [];
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const n = text[i + 1];
        if (c === '"') {
          if (inQuotes && n === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (c === ',' && !inQuotes) {
          row.push(current); current = '';
        } else if ((c === '\n' || c === '\r') && !inQuotes) {
          if (c === '\r' && n === '\n') i++;
          if (current.length || row.length) { row.push(current); rows.push(row); }
          current = ''; row = [];
        } else {
          current += c;
        }
      }
      if (current.length || row.length) { row.push(current); rows.push(row); }
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).filter(r => r.some(v => String(v).trim() !== '')).map(r => {
        const o = {};
        headers.forEach((h, i) => o[h] = (r[i] ?? '').trim());
        return o;
      });
    }

    function normalizeKeyLookup(obj, keys) {
      const lowered = Object.fromEntries(Object.keys(obj).map(k => [k.toLowerCase(), k]));
      for (const key of keys) {
        const hit = lowered[key.toLowerCase()];
        if (hit) return obj[hit];
      }
      return '';
    }

    function classifyAirDescriptor(textBlob) {
      const text = String(textBlob || '').toLowerCase();
      if (/\b(pm2\.5|pm10|particulate|particles?)\b/.test(text)) {
        return { title: 'Air • Particles', body: 'Smoke, dust, soot' };
      }
      if (/\b(ozone|o₃|o3)\b/.test(text)) {
        return { title: 'Air • Ozone (O₃)', body: 'Smog / sunny pollution' };
      }
      if (/\b(no₂|no2|nitrogen dioxide)\b/.test(text)) {
        return { title: 'Air • NO₂', body: 'Traffic / fuel exhaust' };
      }
      return { title: 'Air • Cause unknown', body: 'No clear pollutant posted' };
    }

    function extractAlertInfo(feedText, fallbackPageText) {
      const joined = `${feedText || ''}\n${fallbackPageText || ''}`;
      if (/No alerts in effect\.?/i.test(joined)) {
        return {
          active: false,
          headline: 'No alerts in effect',
          descriptorTitle: '',
          descriptorBody: '',
          cta: ''
        };
      }

      const titleMatch = joined.match(/<title>([^<]*(warning|watch|statement|advisory)[^<]*)<\/title>/i)
        || joined.match(/<summary[^>]*>([\s\S]*?(warning|watch|statement|advisory)[\s\S]*?)<\/summary>/i)
        || joined.match(/# Weather Alerts for:[\s\S]*?\n\n([A-Z][^\n]{3,120}(warning|watch|statement|advisory)[^\n]*)/i);

      const raw = titleMatch ? titleMatch[1].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() : 'Weather alert in effect';
      const pretty = raw.replace(/^Greater Victoria\s*[:-]\s*/i, '').trim();

      return {
        active: true,
        headline: pretty,
        descriptorTitle: pretty,
        descriptorBody: 'Click For Full Details',
        cta: 'Click For Full Details'
      };
    }

    function pickAQStation(rows) {
      if (!Array.isArray(rows) || !rows.length) return null;

      const enriched = rows.map(row => {
        const station = normalizeKeyLookup(row, ['station', 'station_name', 'name', 'location', 'site', 'city']);
        const latitude = parseFloat(normalizeKeyLookup(row, ['lat', 'latitude', 'y']));
        const longitude = parseFloat(normalizeKeyLookup(row, ['lon', 'long', 'longitude', 'x']));
        const value = normalizeKeyLookup(row, ['aqhi', 'aqhi_value', 'value']);
        const category = normalizeKeyLookup(row, ['category', 'risk', 'health_risk', 'healthrisk']);
        const date = normalizeKeyLookup(row, ['observation_datetime', 'datetime', 'date', 'issued_at', 'publication_datetime']);
        const textBlob = Object.values(row).join(' | ');
        let distanceKm = Number.POSITIVE_INFINITY;
        if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
          distanceKm = kmBetween(LAT, LON, latitude, longitude);
        }
        return { row, station, latitude, longitude, distanceKm, value, category, date, textBlob };
      });

      for (const pref of AQHI_PREFERRED_STATIONS) {
        const exact = enriched.find(r => r.station && r.station.toLowerCase().replace(/\s+/g,'') === pref.name.toLowerCase().replace(/\s+/g,''));
        if (exact) return exact;
      }

      const preferredNearby = enriched
        .filter(r => Number.isFinite(r.distanceKm) && r.distanceKm <= 5)
        .sort((a, b) => a.distanceKm - b.distanceKm)[0];

      return preferredNearby || enriched[0] || null;
    }

    async function getWeather() {
      const url = new URL('https://api.open-meteo.com/v1/forecast');
      url.searchParams.set('latitude', LAT);
      url.searchParams.set('longitude', LON);
      url.searchParams.set('timezone', TZ);
      url.searchParams.set('current', [
        'temperature_2m','apparent_temperature','relative_humidity_2m','weather_code','is_day','wind_speed_10m'
      ].join(','));
      url.searchParams.set('hourly', ['uv_index'].join(','));
      url.searchParams.set('daily', [
        'weather_code','temperature_2m_max','temperature_2m_min','sunset','precipitation_probability_max','uv_index_max'
      ].join(','));
      return fetchJson(url.toString());
    }

    async function getAlerts() {
      const [feedText, pageText] = await Promise.allSettled([fetchText(ALERTS_FEED), fetchText(ALERTS_PAGE)]);
      return extractAlertInfo(
        feedText.status === 'fulfilled' ? feedText.value : '',
        pageText.status === 'fulfilled' ? pageText.value : ''
      );
    }

    async function getAQHI() {
      try {
        const listing = await fetchText(AQHI_CSV);
        const csvMatch = listing.match(/href=["']([^"']+\.csv)["']/i);
        const csvUrl = csvMatch
          ? new URL(csvMatch[1], AQHI_CSV + '/').toString()
          : AQHI_CSV.replace(/\/$/, '') + '/';

        let csvText = '';
        if (csvMatch) {
          csvText = await fetchText(csvUrl);
        } else {
          csvText = listing;
        }

        const rows = parseCSV(csvText);
        const selected = pickAQStation(rows);
        if (!selected) {
          return {
            aqhiValue: '—',
            riskLabel: 'Unavailable',
            stationName: 'Unavailable',
            descriptor: { title: 'Air • Cause unknown', body: 'No clear pollutant posted' },
            observedAt: ''
          };
        }

        const risk = aqhiRisk(selected.value);
        const explicitDescriptor = classifyAirDescriptor(selected.textBlob);

        return {
          aqhiValue: selected.value || '—',
          riskLabel: selected.category || risk.label,
          stationName: selected.station || 'AQHI station',
          descriptor: explicitDescriptor,
          observedAt: selected.date || ''
        };
      } catch (err) {
        return {
          aqhiValue: '—',
          riskLabel: 'Unavailable',
          stationName: 'Unavailable',
          descriptor: { title: 'Air • Cause unknown', body: 'No clear pollutant posted' },
          observedAt: ''
        };
      }
    }

    function render(weather, alerts, air) {
      const current = weather.current;
      const nowUv = (() => {
        const times = weather.hourly?.time || [];
        const values = weather.hourly?.uv_index || [];
        const now = new Date();
        let bestIndex = 0;
        let bestDiff = Infinity;
        for (let i = 0; i < times.length; i++) {
          const diff = Math.abs(new Date(times[i]).getTime() - now.getTime());
          if (diff < bestDiff) { bestDiff = diff; bestIndex = i; }
        }
        return values[bestIndex];
      })();

      const uv = uvRisk(nowUv);
      const risk = aqhiRisk(air.aqhiValue);
      const high = Math.round(weather.daily.temperature_2m_max[0]);
      const low = Math.round(weather.daily.temperature_2m_min[0]);
      const sunset = formatTime(weather.daily.sunset[0]);
      const currentIcon = iconForCode(current.weather_code, current.is_day);
      const currentCondition = conditionForCode(current.weather_code);

      const showAlertDescriptor = !!alerts.active;
      const showAirDescriptor = !!air.descriptor;
      const dividerClass = showAlertDescriptor && showAirDescriptor ? 'descriptor-divider show' : 'descriptor-divider';

      const forecastHtml = weather.daily.time.slice(0, 5).map((date, i) => {
        const day = formatDayName(date);
        const dateText = formatShortDate(date);
        const icon = iconForCode(weather.daily.weather_code[i], 1);
        const cond = conditionForCode(weather.daily.weather_code[i]);
        const hi = Math.round(weather.daily.temperature_2m_max[i]);
        const lo = Math.round(weather.daily.temperature_2m_min[i]);
        const pop = weather.daily.precipitation_probability_max[i];
        return `
          <div class="forecast-card">
            <div class="fc-day">${escapeHtml(day)}</div>
            <div class="fc-date">${escapeHtml(dateText)}</div>
            <div class="fc-icon">${icon}</div>
            <div class="fc-cond">${escapeHtml(cond)}</div>
            <div class="fc-divider"></div>
            <div class="fc-high">${hi}°</div>
            <div class="fc-low">Night ${lo}°</div>
            <div class="fc-pop">💧 ${Number.isFinite(pop) ? pop : 0}%</div>
          </div>
        `;
      }).join('');

      app.innerHTML = `
        <div class="top">
          <div class="hero">
            <div class="place">View Royal</div>
            <div class="updated">${escapeHtml(formatUpdated())}</div>
            <div class="hero-main">
              <div class="temp-block">
                <div class="current-temp">${Math.round(current.temperature_2m)}°</div>
                <div class="condition">${escapeHtml(currentCondition)}</div>
                <div class="meta">
                  <span>Feels like ${Math.round(current.apparent_temperature)}°</span>
                  <span>High ${high}° / Low ${low}°</span>
                </div>
              </div>
              <div class="hero-icon-wrap">
                <div class="hero-icon" aria-hidden="true">${currentIcon}</div>
              </div>
            </div>
          </div>

          <div class="descriptor-stack">
            <div class="descriptor ${showAlertDescriptor ? '' : 'hidden'}">
              <div class="descriptor-title">${escapeHtml(alerts.descriptorTitle || '')}</div>
              <div class="descriptor-body">${escapeHtml(alerts.descriptorBody || '')}</div>
            </div>
            <div class="${dividerClass}"></div>
            <div class="descriptor ${showAirDescriptor ? '' : 'hidden'}">
              <div class="descriptor-title">${escapeHtml(air.descriptor.title)}</div>
              <div class="descriptor-body">${escapeHtml(air.descriptor.body)}</div>
            </div>
          </div>
        </div>

        <div class="mid">
          <div class="card stat" id="card-wind">
            <div class="stat-label">Wind</div>
            <div class="stat-value">${Math.round(current.wind_speed_10m)} km/h</div>
            <div class="stat-sub">Current wind speed</div>
          </div>

          <div class="card stat" id="card-air">
            <div class="stat-label">Air Quality</div>
            <div class="stat-value"><span class="aqhi-badge" style="background:${risk.color}">${escapeHtml(String(air.aqhiValue))}</span>${escapeHtml(air.riskLabel)}</div>
            <div class="stat-sub">Health Risk</div>
          </div>

          <div class="card stat" id="card-sunset">
            <div class="stat-label">Sunset</div>
            <div class="stat-value">${escapeHtml(sunset)}</div>
            <div class="stat-sub">Today</div>
          </div>

          <div class="card stat" id="card-uv">
            <div class="stat-label">UV</div>
            <div class="stat-value" style="font-size:25px">${Number.isFinite(Number(nowUv)) ? Number(nowUv).toFixed(1).replace(/\.0$/,'') : '—'}</div>
            <div class="stat-sub" style="color:${uv.color}">${escapeHtml(uv.label)}</div>
          </div>

          <a class="alert-link" href="${escapeHtml(ALERTS_PAGE)}" target="_blank" rel="noopener noreferrer" aria-label="Open official alert details">
            <div class="alert-card">
              <div class="alert-text">
                <div class="alert-main">${escapeHtml(alerts.headline)}</div>
                <div class="alert-sub">${alerts.active ? 'Click For Full Details' : ''}</div>
              </div>
              <div class="alert-cta">${escapeHtml(alerts.cta || '')}</div>
            </div>
          </a>

          <div class="card stat" id="card-humidity">
            <div class="stat-label">Humidity</div>
            <div class="stat-value">${Math.round(current.relative_humidity_2m)}%</div>
            <div class="stat-sub">Relative humidity</div>
          </div>
        </div>

        <div class="forecast">${forecastHtml}</div>
      `;
    }

    async function init() {
      try {
        const [weather, alerts, air] = await Promise.all([
          getWeather(),
          getAlerts(),
          getAQHI()
        ]);
        render(weather, alerts, air);
      } catch (err) {
        console.error(err);
        app.innerHTML = `<div class="error">Weather widget failed to load.</div>`;
      }
    }

    init();
    setInterval(init, 15 * 60 * 1000);
  </script>
</body>
</html>
