<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Weather Combined</title>

  <style>
    :root{
      --bg: #040b1f;
      --card: #07122b;
      --panel: #081630;
      --panel-2: #091936;
      --border: rgba(80, 145, 255, 0.22);
      --border-strong: rgba(80, 145, 255, 0.34);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.72);
      --accent: #3dc9ff;
      --accent-soft: rgba(61, 201, 255, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        linear-gradient(180deg, #07122b, #040b1f);
      border: 1px solid var(--border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px rgba(50, 100, 220, 0.03);
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 8px;
      overflow: hidden;
      contain: layout paint;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 3px;
      letter-spacing: 0.1px;
      color: var(--text);
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.15;
      margin-bottom: 3px;
    }

    .updated {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-box {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #weatherIcon {
      width: 42px;
      height: 42px;
      object-fit: contain;
      display: block;
    }

    .hero {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .temp {
      font-size: 44px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -1.2px;
      margin: 0;
      color: var(--text);
    }

    .condition {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feels {
      font-size: 12px;
      line-height: 1.15;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      min-height: 0;
    }

    .stat {
      min-height: 58px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 7px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .stat-label {
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-sub {
      font-size: 10px;
      line-height: 1;
      color: var(--muted);
      margin-top: 4px;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      min-height: 0;
    }

    .forecast-day {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .forecast-name {
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      margin-bottom: 5px;
      text-align: center;
      white-space: nowrap;
    }

    .forecast-icon-wrap {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .forecast-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .forecast-cond {
      font-size: 10px;
      line-height: 1.05;
      color: var(--muted);
      text-align: center;
      min-height: 22px;
      max-height: 22px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 4px;
    }

    .forecast-temps {
      margin-top: auto;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .card {
        padding: 8px;
        gap: 6px;
        border-radius: 16px;
      }

      .title { font-size: 15px; }
      .subtitle, .updated { font-size: 10px; }

      .icon-box {
        width: 50px;
        height: 50px;
      }

      #weatherIcon {
        width: 36px;
        height: 36px;
      }

      .temp { font-size: 39px; }
      .condition { font-size: 14px; }
      .feels { font-size: 11px; }

      .stat {
        min-height: 54px;
        padding: 6px 7px;
      }

      .stat-label { font-size: 9px; }
      .stat-value { font-size: 14px; }
      .stat-sub { font-size: 9px; }

      .forecast-name { font-size: 10px; }
      .forecast-cond {
        font-size: 9px;
        min-height: 20px;
        max-height: 20px;
      }
      .forecast-temps { font-size: 12px; }

      .forecast-icon-wrap {
        width: 20px;
        height: 20px;
      }

      .forecast-icon {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="title-wrap">
        <div class="title">Greater Victoria</div>
        <div class="subtitle">Current weather + 4-day forecast</div>
        <div class="updated" id="updated">Loading…</div>
      </div>

      <div class="icon-box">
        <img id="weatherIcon" alt="Current weather" />
      </div>
    </div>

    <div class="hero">
      <div class="temp" id="temp">--°C</div>
      <div class="condition" id="condition">Loading…</div>
      <div class="feels" id="feelsLike">Feels like --°C</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Wind speed</div>
        <div class="stat-value" id="wind">-- km/h</div>
      </div>

      <div class="stat">
        <div class="stat-label">Wind gusts</div>
        <div class="stat-value" id="gust">-- km/h</div>
      </div>

      <div class="stat">
        <div class="stat-label">Direction</div>
        <div class="stat-value" id="direction">--</div>
        <div class="stat-sub" id="directionDeg">--°</div>
      </div>

      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
      </div>
    </div>

    <div class="forecast">
      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>

      <div class="forecast-day">
        <div class="forecast-name" data-dow>--</div>
        <div class="forecast-icon-wrap">
          <img class="forecast-icon" data-icon alt="Forecast icon" />
        </div>
        <div class="forecast-cond" data-cond>Loading…</div>
        <div class="forecast-temps" data-temps>--° / --°</div>
      </div>
    </div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const API_URL =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=auto&wind_speed_unit=kmh&forecast_days=4`;

    const ICON_BASE = "https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/";
    const FALLBACK_DAY = "partly-cloudy-day.svg";
    const FALLBACK_NIGHT = "partly-cloudy-night.svg";
    const FORECAST_FALLBACK = "partly-cloudy-day.svg";

    function codeText(code) {
      if (code === 0) return "Clear";
      if (code === 1) return "Mainly clear";
      if (code === 2) return "Partly cloudy";
      if (code === 3) return "Overcast";
      if (code === 45 || code === 48) return "Fog";
      if ([51, 53, 55].includes(code)) return "Drizzle";
      if ([56, 57].includes(code)) return "Freezing drizzle";
      if ([61, 63, 65].includes(code)) return "Rain";
      if ([66, 67].includes(code)) return "Freezing rain";
      if ([71, 73, 75, 77].includes(code)) return "Snow";
      if ([80, 81, 82].includes(code)) return "Showers";
      if ([85, 86].includes(code)) return "Snow showers";
      if ([95, 96, 99].includes(code)) return "Thunderstorm";
      return "Conditions unavailable";
    }

    function degToCompass(deg) {
      const dirs = ["N","NE","E","SE","S","SW","W","NW"];
      return dirs[Math.round((((deg % 360) + 360) % 360) / 45) % 8];
    }

    function fmtDay(dateStr) {
      return new Date(dateStr + "T12:00:00").toLocaleDateString("en-CA", {
        weekday: "short"
      });
    }

    function currentIconFile(code, isDay) {
      if (code === 0) return isDay ? "clear-day.svg" : "clear-night.svg";
      if (code === 1 || code === 2) return isDay ? "partly-cloudy-day.svg" : "partly-cloudy-night.svg";
      if (code === 3) return "overcast.svg";
      if (code === 45 || code === 48) return "fog.svg";
      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";
      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";
      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";
      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";
      if ([85, 86].includes(code)) return "snow.svg";
      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";
      return isDay ? FALLBACK_DAY : FALLBACK_NIGHT;
    }

    function forecastIconFile(code) {
      if (code === 0) return "clear-day.svg";
      if (code === 1 || code === 2) return "partly-cloudy-day.svg";
      if (code === 3) return "overcast.svg";
      if (code === 45 || code === 48) return "fog.svg";
      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";
      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";
      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";
      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";
      if ([85, 86].includes(code)) return "snow.svg";
      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";
      return FORECAST_FALLBACK;
    }

    function setImgWithFallback(img, file, fallback) {
      img.onerror = function () {
        this.onerror = null;
        this.src = ICON_BASE + fallback;
      };
      img.src = ICON_BASE + file;
    }

    const forecastCards = Array.from(document.querySelectorAll(".forecast-day")).map(card => ({
      dow: card.querySelector("[data-dow]"),
      icon: card.querySelector("[data-icon]"),
      cond: card.querySelector("[data-cond]"),
      temps: card.querySelector("[data-temps]")
    }));

    async function loadWeather() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const c = data.current;

        document.getElementById("temp").textContent = `${Math.round(c.temperature_2m)}°C`;
        document.getElementById("condition").textContent = codeText(c.weather_code);
        document.getElementById("feelsLike").textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;

        document.getElementById("wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;
        document.getElementById("gust").textContent = `${Math.round(c.wind_gusts_10m || 0)} km/h`;

        const deg = Math.round(c.wind_direction_10m);
        document.getElementById("direction").textContent = degToCompass(c.wind_direction_10m);
        document.getElementById("directionDeg").textContent = `${deg}°`;

        document.getElementById("humidity").textContent = `${Math.round(c.relative_humidity_2m)}%`;
        document.getElementById("updated").textContent =
          `Updated ${new Date(c.time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        const currentImg = document.getElementById("weatherIcon");
        setImgWithFallback(
          currentImg,
          currentIconFile(c.weather_code, c.is_day === 1),
          c.is_day === 1 ? FALLBACK_DAY : FALLBACK_NIGHT
        );

        for (let i = 0; i < 4; i++) {
          const code = data.daily.weather_code[i];
          const card = forecastCards[i];

          card.dow.textContent = fmtDay(data.daily.time[i]);
          card.cond.textContent = codeText(code);
          card.temps.textContent =
            `${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°`;

          setImgWithFallback(card.icon, forecastIconFile(code), FORECAST_FALLBACK);
        }
      } catch (err) {
        document.getElementById("updated").textContent = "Weather update failed";
        console.error("Weather widget error:", err);
      }
    }

    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
