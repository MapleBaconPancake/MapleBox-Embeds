<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Current Weather</title>
  <style>
    :root{
      --panel: rgba(15,18,24,.82);
      --panel2: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.12);
      --text: #f4f7fb;
      --muted: rgba(244,247,251,.72);
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%;
      background: transparent; color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }
    body { padding: 10px; }
    .card {
      height: calc(100vh - 20px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .title { font-size: 22px; font-weight: 800; }
    .subtitle, .updated { font-size: 12px; color: var(--muted); }
    .temp { font-size: 62px; font-weight: 900; line-height: 1; margin: 8px 0; }
    .condition { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .feels { font-size: 13px; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .metric {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }
    .label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 6px;
    }
    .value { font-size: 24px; font-weight: 800; }
    .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <div class="top">
        <div>
          <div class="title">Greater Victoria</div>
          <div class="subtitle">Current weather</div>
        </div>
        <div class="updated" id="updated">Loading…</div>
      </div>

      <div class="temp" id="temp">--°C</div>
      <div class="condition" id="condition">Loading…</div>
      <div class="feels" id="feelsLike">Feels like --°C</div>

      <div class="grid">
        <div class="metric">
          <div class="label">Wind speed</div>
          <div class="value" id="wind">-- km/h</div>
        </div>
        <div class="metric">
          <div class="label">Wind gusts</div>
          <div class="value" id="gust">-- km/h</div>
        </div>
        <div class="metric">
          <div class="label">Direction</div>
          <div class="value" id="direction">--</div>
          <div class="sub" id="directionDeg">--°</div>
        </div>
        <div class="metric">
          <div class="label">Humidity</div>
          <div class="value" id="humidity">--%</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m` +
      `&timezone=auto&wind_speed_unit=kmh`;

    function codeText(code) {
      const map = {
        0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
        45:"Fog",48:"Rime fog",51:"Light drizzle",53:"Drizzle",55:"Dense drizzle",
        61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",
        80:"Rain showers",81:"Rain showers",82:"Heavy showers",95:"Thunderstorm"
      };
      return map[code] || "Unknown";
    }

    function degToCompass(num) {
      const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      return dirs[Math.round(num / 22.5) % 16];
    }

    async function loadWeather() {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();
      const c = data.current;

      document.getElementById("temp").textContent = `${Math.round(c.temperature_2m)}°C`;
      document.getElementById("condition").textContent = codeText(c.weather_code);
      document.getElementById("feelsLike").textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;
      document.getElementById("wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;
      document.getElementById("gust").textContent = `${Math.round(c.wind_gusts_10m || 0)} km/h`;

      const deg = Math.round(c.wind_direction_10m);
      document.getElementById("direction").textContent = degToCompass(c.wind_direction_10m);
      document.getElementById("directionDeg").textContent = `${deg}°`;
      document.getElementById("humidity").textContent = `${Math.round(c.relative_humidity_2m)}%`;

      document.getElementById("updated").textContent =
        `Updated ${new Date(c.time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;
    }

    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
