<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Current Weather</title>
  <style>
    :root{
      --panel: rgba(15,18,24,.72);
      --panel2: rgba(255,255,255,.05);
      --border: rgba(255,255,255,.08);
      --text: #f4f7fb;
      --muted: rgba(244,247,251,.72);
      --shadow: none;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      background: var(--panel);
      border: 0;
      border-radius: 18px;
      box-shadow: none;
      backdrop-filter: blur(10px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .top-left {
      min-width: 0;
      flex: 1;
    }

    .icon-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 78px;
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.06);
      overflow: hidden;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .subtitle,
    .updated {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
    }

    .updated {
      margin-top: 4px;
    }

    .temp {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      margin: 6px 0 4px;
    }

    .condition {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .feels {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }

    .metric {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 11px;
      min-height: 78px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }

    .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.1;
    }

    #weatherIcon {
      width: 64px;
      height: 64px;
      display: block;
      object-fit: contain;
    }

    @media (max-width: 420px) {
      .card {
        padding: 12px;
        border-radius: 16px;
      }

      .title {
        font-size: 17px;
      }

      .temp {
        font-size: 46px;
      }

      .icon-wrap {
        width: 70px;
        height: 70px;
      }

      #weatherIcon {
        width: 58px;
        height: 58px;
      }

      .metric {
        min-height: 72px;
        padding: 9px 10px;
      }

      .value {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="top-left">
        <div class="title">Greater Victoria</div>
        <div class="subtitle">Current weather</div>
        <div class="updated" id="updated">Loading…</div>
      </div>

      <div class="icon-wrap">
        <img id="weatherIcon" alt="Current weather icon" />
      </div>
    </div>

    <div class="temp" id="temp">--°C</div>
    <div class="condition" id="condition">Loading…</div>
    <div class="feels" id="feelsLike">Feels like --°C</div>

    <div class="grid">
      <div class="metric">
        <div class="label">Wind speed</div>
        <div class="value" id="wind">-- km/h</div>
      </div>

      <div class="metric">
        <div class="label">Wind gusts</div>
        <div class="value" id="gust">-- km/h</div>
      </div>

      <div class="metric">
        <div class="label">Direction</div>
        <div class="value" id="direction">--</div>
        <div class="sub" id="directionDeg">--°</div>
      </div>

      <div class="metric">
        <div class="label">Humidity</div>
        <div class="value" id="humidity">--%</div>
      </div>
    </div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day` +
      `&timezone=auto&wind_speed_unit=kmh`;

    const ICON_BASE = "https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/";

    function codeText(code) {
      const map = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Rime fog",
        51: "Light drizzle",
        53: "Drizzle",
        55: "Dense drizzle",
        56: "Freezing drizzle",
        57: "Dense freezing drizzle",
        61: "Light rain",
        63: "Rain",
        65: "Heavy rain",
        66: "Freezing rain",
        67: "Heavy freezing rain",
        71: "Light snow",
        73: "Snow",
        75: "Heavy snow",
        77: "Snow grains",
        80: "Rain showers",
        81: "Rain showers",
        82: "Heavy showers",
        85: "Snow showers",
        86: "Heavy snow showers",
        95: "Thunderstorm",
        96: "Thunderstorm with hail",
        99: "Severe thunderstorm with hail"
      };
      return map[code] || "Unknown";
    }

    function degToCompass(num) {
      const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      return dirs[Math.round(num / 22.5) % 16];
    }

    function mapWeatherCodeToIcon(code, isDay) {
      if (code === 0) return isDay ? "clear-day.svg" : "clear-night.svg";
      if (code === 1) return isDay ? "mostly-clear-day.svg" : "mostly-clear-night.svg";
      if (code === 2) return isDay ? "partly-cloudy-day.svg" : "partly-cloudy-night.svg";
      if (code === 3) return "overcast.svg";

      if (code === 45 || code === 48) return "fog.svg";

      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";

      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";

      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";

      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";

      if ([85, 86].includes(code)) return "snow.svg";

      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";

      return isDay ? "partly-cloudy-day.svg" : "partly-cloudy-night.svg";
    }

    function setAnimatedIcon(weatherCode, isDay) {
      const iconFile = mapWeatherCodeToIcon(weatherCode, isDay);
      document.getElementById("weatherIcon").src = ICON_BASE + iconFile;
    }

    async function loadWeather() {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();
      const c = data.current;

      document.getElementById("temp").textContent = `${Math.round(c.temperature_2m)}°C`;
      document.getElementById("condition").textContent = codeText(c.weather_code);
      document.getElementById("feelsLike").textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;
      document.getElementById("wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;
      document.getElementById("gust").textContent = `${Math.round(c.wind_gusts_10m || 0)} km/h`;

      const deg = Math.round(c.wind_direction_10m);
      document.getElementById("direction").textContent = degToCompass(c.wind_direction_10m);
      document.getElementById("directionDeg").textContent = `${deg}°`;
      document.getElementById("humidity").textContent = `${Math.round(c.relative_humidity_2m)}%`;

      document.getElementById("updated").textContent =
        `Updated ${new Date(c.time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

      setAnimatedIcon(c.weather_code, c.is_day === 1);
    }

    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
