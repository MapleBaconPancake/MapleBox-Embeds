<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Current Weather</title>

  <style>
    :root{
      --bg: #040b1f;
      --card: #07122b;
      --panel: #081630;
      --panel-2: #091936;
      --border: rgba(80, 145, 255, 0.22);
      --text: #f2f6ff;
      --muted: rgba(223, 232, 255, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        linear-gradient(180deg, #07122b, #040b1f);
      border: 1px solid var(--border);
      box-shadow: none;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow: hidden;
      contain: layout paint;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .top-left {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
      color: var(--text);
    }

    .subtitle,
    .updated {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.2;
    }

    .updated {
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-wrap {
      width: 76px;
      height: 76px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    #weatherIcon {
      width: 60px;
      height: 60px;
      display: block;
      object-fit: contain;
    }

    .temp {
      font-size: 52px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -1.2px;
      margin: 6px 0 4px;
      color: var(--text);
    }

    .condition {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feels {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }

    .metric {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 11px;
      min-height: 78px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.1;
    }

    @media (max-width: 420px) {
      .card {
        padding: 10px;
        border-radius: 0;
      }

      .title {
        font-size: 17px;
      }

      .temp {
        font-size: 46px;
      }

      .icon-wrap {
        width: 68px;
        height: 68px;
      }

      #weatherIcon {
        width: 54px;
        height: 54px;
      }

      .metric {
        min-height: 72px;
        padding: 9px 10px;
      }

      .value {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="top-left">
        <div class="title">Greater Victoria</div>
        <div class="subtitle">Current weather</div>
        <div class="updated" id="updated">Loading…</div>
      </div>

      <div class="icon-wrap">
        <img id="weatherIcon" alt="Current weather" />
      </div>
    </div>

    <div class="temp" id="temp">--°C</div>
    <div class="condition" id="condition">Loading…</div>
    <div class="feels" id="feelsLike">Feels like --°C</div>

    <div class="grid">
      <div class="metric">
        <div class="label">Wind speed</div>
        <div class="value" id="wind">-- km/h</div>
      </div>

      <div class="metric">
        <div class="label">Wind gusts</div>
        <div class="value" id="gust">-- km/h</div>
      </div>

      <div class="metric">
        <div class="label">Direction</div>
        <div class="value" id="direction">--</div>
        <div class="sub" id="directionDeg">--°</div>
      </div>

      <div class="metric">
        <div class="label">Humidity</div>
        <div class="value" id="humidity">--%</div>
      </div>
    </div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const API_URL =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day` +
      `&timezone=auto&wind_speed_unit=kmh`;

    const ICON_BASE = "https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/";
    const FALLBACK_DAY = "partly-cloudy-day.svg";
    const FALLBACK_NIGHT = "partly-cloudy-night.svg";

    function codeText(code) {
      const map = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Rime fog",
        51: "Light drizzle",
        53: "Drizzle",
        55: "Dense drizzle",
        56: "Freezing drizzle",
        57: "Dense freezing drizzle",
        61: "Light rain",
        63: "Rain",
        65: "Heavy rain",
        66: "Freezing rain",
        67: "Heavy freezing rain",
        71: "Light snow",
        73: "Snow",
        75: "Heavy snow",
        77: "Snow grains",
        80: "Rain showers",
        81: "Rain showers",
        82: "Heavy showers",
        85: "Snow showers",
        86: "Heavy snow showers",
        95: "Thunderstorm",
        96: "Thunderstorm with hail",
        99: "Severe thunderstorm with hail"
      };
      return map[code] || "Unknown";
    }

    function degToCompass(num) {
      const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      return dirs[Math.round(num / 22.5) % 16];
    }

    function mapWeatherCodeToIcon(code, isDay) {
      if (code === 0) return isDay ? "clear-day.svg" : "clear-night.svg";
      if (code === 1 || code === 2) return isDay ? "partly-cloudy-day.svg" : "partly-cloudy-night.svg";
      if (code === 3) return "overcast.svg";
      if (code === 45 || code === 48) return "fog.svg";
      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";
      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";
      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";
      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";
      if ([85, 86].includes(code)) return "snow.svg";
      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";
      return isDay ? FALLBACK_DAY : FALLBACK_NIGHT;
    }

    function setWeatherIcon(weatherCode, isDay) {
      const iconFile = mapWeatherCodeToIcon(weatherCode, isDay);
      const img = document.getElementById("weatherIcon");

      img.onerror = function () {
        this.onerror = null;
        this.src = ICON_BASE + (isDay ? FALLBACK_DAY : FALLBACK_NIGHT);
      };

      img.src = ICON_BASE + iconFile;
    }

    async function loadWeather() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const c = data.current;

        document.getElementById("temp").textContent = `${Math.round(c.temperature_2m)}°C`;
        document.getElementById("condition").textContent = codeText(c.weather_code);
        document.getElementById("feelsLike").textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;
        document.getElementById("wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;
        document.getElementById("gust").textContent = `${Math.round(c.wind_gusts_10m || 0)} km/h`;

        const deg = Math.round(c.wind_direction_10m);
        document.getElementById("direction").textContent = degToCompass(c.wind_direction_10m);
        document.getElementById("directionDeg").textContent = `${deg}°`;
        document.getElementById("humidity").textContent = `${Math.round(c.relative_humidity_2m)}%`;

        document.getElementById("updated").textContent =
          `Updated ${new Date(c.time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        setWeatherIcon(c.weather_code, c.is_day === 1);
      } catch (err) {
        document.getElementById("updated").textContent = "Weather update failed";
        console.error("Weather widget error:", err);
      }
    }

    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
