<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Forecast</title>
  <style>
    :root{
      --panel: rgba(3, 10, 28, 0.82);
      --panel2: rgba(10, 20, 46, 0.72);
      --border: rgba(82, 140, 255, 0.18);
      --text: #eef4ff;
      --muted: rgba(210, 225, 255, 0.72);
      --accent: #39c6ff;
      --shadow: 0 0 0 1px rgba(70,120,255,.08), 0 10px 30px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, rgba(8,18,44,.88), rgba(3,10,28,.86));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 14px;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
      color: var(--text);
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .day {
      background: linear-gradient(180deg, rgba(12,24,56,.78), rgba(8,16,38,.72));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      min-height: 0;
    }

    .dow {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .cond {
      font-size: 12px;
      line-height: 1.3;
      color: var(--text);
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .temps {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--text);
      margin-top: 8px;
    }

    @media (max-width: 420px) {
      .card {
        padding: 12px;
        border-radius: 16px;
      }

      .title {
        font-size: 17px;
      }

      .grid {
        gap: 8px;
      }

      .day {
        padding: 9px 6px;
      }

      .dow {
        font-size: 12px;
      }

      .cond {
        font-size: 11px;
        min-height: 30px;
      }

      .temps {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Greater Victoria</div>
    <div class="subtitle">4-day forecast</div>
    <div class="grid" id="forecastGrid"></div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4`;

    function codeText(code) {
      const map = {
        0:"Clear sky",
        1:"Mainly clear",
        2:"Partly cloudy",
        3:"Overcast",
        45:"Fog",
        48:"Rime fog",
        51:"Light drizzle",
        53:"Drizzle",
        55:"Dense drizzle",
        61:"Light rain",
        63:"Rain",
        65:"Heavy rain",
        71:"Light snow",
        73:"Snow",
        75:"Heavy snow",
        80:"Rain showers",
        81:"Rain showers",
        82:"Heavy showers",
        95:"Thunderstorm"
      };
      return map[code] || "Unknown";
    }

    function fmtDay(dateStr) {
      return new Date(dateStr + "T12:00:00").toLocaleDateString("en-CA", { weekday: "short" });
    }

    async function loadForecast() {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();
      const grid = document.getElementById("forecastGrid");
      grid.innerHTML = "";

      data.daily.time.forEach((day, i) => {
        const el = document.createElement("div");
        el.className = "day";
        el.innerHTML = `
          <div class="dow">${fmtDay(day)}</div>
          <div class="cond">${codeText(data.daily.weather_code[i])}</div>
          <div class="temps">${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>
        `;
        grid.appendChild(el);
      });
    }

    loadForecast();
    setInterval(loadForecast, 30 * 60 * 1000);
  </script>
</body>
</html>
