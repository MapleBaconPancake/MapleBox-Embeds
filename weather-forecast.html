<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Victoria Forecast</title>
  <style>
    :root{
      --panel: rgba(3, 10, 28, 0.82);
      --panel2: rgba(10, 20, 46, 0.72);
      --border: rgba(82, 140, 255, 0.18);
      --text: #eef4ff;
      --muted: rgba(210, 225, 255, 0.72);
      --accent: #39c6ff;
      --shadow: 0 0 0 1px rgba(70,120,255,.08), 0 10px 30px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, rgba(8,18,44,.88), rgba(3,10,28,.86));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1px;
      color: var(--text);
    }

    .subtitle {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    .day {
      background: linear-gradient(180deg, rgba(12,24,56,.78), rgba(8,16,38,.72));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      overflow: hidden;
    }

    .dow {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.05;
    }

    .icon-wrap {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .forecast-icon {
      width: 32px;
      height: 32px;
      display: block;
      object-fit: contain;
    }

    .cond {
      font-size: 11px;
      line-height: 1.15;
      color: var(--text);
      text-align: center;
      min-height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
    }

    .temps {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      margin-top: auto;
    }

    @media (max-width: 420px) {
      .card {
        padding: 8px;
        border-radius: 16px;
      }

      .title {
        font-size: 15px;
      }

      .subtitle {
        font-size: 9px;
        margin-bottom: 7px;
      }

      .grid {
        gap: 6px;
      }

      .day {
        padding: 7px 5px;
        border-radius: 10px;
      }

      .dow {
        font-size: 11px;
        margin-bottom: 5px;
      }

      .icon-wrap {
        width: 28px;
        height: 28px;
        margin-bottom: 5px;
      }

      .forecast-icon {
        width: 28px;
        height: 28px;
      }

      .cond {
        font-size: 10px;
        min-height: 22px;
        margin-bottom: 5px;
      }

      .temps {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Greater Victoria</div>
    <div class="subtitle">4-day forecast</div>
    <div class="grid" id="forecastGrid"></div>
  </div>

  <script>
    const LAT = 48.4284;
    const LON = -123.3656;

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=auto&forecast_days=4`;

    const ICON_BASE = "https://raw.githubusercontent.com/basmilius/weather-icons/dev/production/fill/svg/";
    const FALLBACK_ICON = "partly-cloudy-day.svg";

    function codeText(code) {
      const map = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Rime fog",
        51: "Light drizzle",
        53: "Drizzle",
        55: "Dense drizzle",
        56: "Freezing drizzle",
        57: "Dense freezing drizzle",
        61: "Light rain",
        63: "Rain",
        65: "Heavy rain",
        66: "Freezing rain",
        67: "Heavy freezing rain",
        71: "Light snow",
        73: "Snow",
        75: "Heavy snow",
        77: "Snow grains",
        80: "Rain showers",
        81: "Rain showers",
        82: "Heavy showers",
        85: "Snow showers",
        86: "Heavy snow showers",
        95: "Thunderstorm",
        96: "Thunderstorm with hail",
        99: "Severe thunderstorm with hail"
      };
      return map[code] || "Unknown";
    }

    function mapWeatherCodeToIcon(code) {
      if (code === 0) return "clear-day.svg";
      if (code === 1) return "partly-cloudy-day.svg";
      if (code === 2) return "partly-cloudy-day.svg";
      if (code === 3) return "overcast.svg";

      if (code === 45 || code === 48) return "fog.svg";

      if ([51, 53].includes(code)) return "drizzle.svg";
      if ([55].includes(code)) return "extreme-drizzle.svg";
      if ([56, 57].includes(code)) return "sleet.svg";

      if ([61, 63].includes(code)) return "rain.svg";
      if ([65].includes(code)) return "extreme-rain.svg";
      if ([66, 67].includes(code)) return "sleet.svg";

      if ([71, 73].includes(code)) return "snow.svg";
      if ([75].includes(code)) return "extreme-snow.svg";
      if ([77].includes(code)) return "snowflake.svg";

      if ([80, 81].includes(code)) return "showers.svg";
      if ([82].includes(code)) return "extreme-showers.svg";

      if ([85, 86].includes(code)) return "snow.svg";

      if ([95].includes(code)) return "thunderstorms.svg";
      if ([96, 99].includes(code)) return "severe-thunderstorms.svg";

      return FALLBACK_ICON;
    }

    function fmtDay(dateStr) {
      return new Date(dateStr + "T12:00:00").toLocaleDateString("en-CA", { weekday: "short" });
    }

    async function loadForecast() {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();
      const grid = document.getElementById("forecastGrid");
      grid.innerHTML = "";

      data.daily.time.forEach((day, i) => {
        const code = data.daily.weather_code[i];
        const iconFile = mapWeatherCodeToIcon(code);

        const el = document.createElement("div");
        el.className = "day";
        el.innerHTML = `
          <div class="dow">${fmtDay(day)}</div>
          <div class="icon-wrap">
            <img class="forecast-icon" src="${ICON_BASE + iconFile}" alt="${codeText(code)}" />
          </div>
          <div class="cond">${codeText(code)}</div>
          <div class="temps">${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>
        `;

        const img = el.querySelector(".forecast-icon");
        img.onerror = function () {
          this.onerror = null;
          this.src = ICON_BASE + FALLBACK_ICON;
        };

        grid.appendChild(el);
      });
    }

    loadForecast();
    setInterval(loadForecast, 30 * 60 * 1000);
  </script>
</body>
</html>
