<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Greater Victoria Alerts</title>
  <style>
    :root{
      --panel: rgba(3, 10, 28, 0.82);
      --panel2: rgba(10, 20, 46, 0.72);
      --border: rgba(82, 140, 255, 0.18);
      --text: #eef4ff;
      --muted: rgba(210, 225, 255, 0.72);
      --good: #69db7c;
      --warn: #ffd43b;
      --bad: #ff8787;
      --shadow: 0 0 0 1px rgba(70,120,255,.08), 0 10px 30px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, rgba(8,18,44,.88), rgba(3,10,28,.86));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .heading {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1px;
      color: var(--text);
    }

    .subtitle {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.15;
    }

    .links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
      max-width: 52%;
    }

    a {
      text-decoration: none;
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      padding: 7px 9px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(12,24,56,.78), rgba(8,16,38,.72));
      border: 1px solid var(--border);
      line-height: 1;
      white-space: nowrap;
    }

    .badge {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(12,24,56,.78), rgba(8,16,38,.72));
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }

    .badge.ok { color: var(--good); }
    .badge.warn { color: var(--warn); }
    .badge.bad { color: var(--bad); }

    .body {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow: auto;
      flex: 1;
      min-height: 0;
      padding-right: 2px;
    }

    .alert-item {
      background: linear-gradient(180deg, rgba(12,24,56,.78), rgba(8,16,38,.72));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 10px;
      margin-top: 8px;
    }

    .alert-item:first-child {
      margin-top: 0;
    }

    .alert-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .alert-summary {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
    }

    .alert-updated {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.2;
    }

    @media (max-width: 420px) {
      .card {
        padding: 8px;
        border-radius: 16px;
        gap: 7px;
      }

      .title {
        font-size: 15px;
      }

      .subtitle {
        font-size: 9px;
      }

      .topbar {
        gap: 6px;
      }

      .links {
        gap: 5px;
        max-width: 56%;
      }

      a {
        font-size: 10px;
        padding: 6px 8px;
        border-radius: 9px;
      }

      .badge {
        font-size: 13px;
        padding: 9px 10px;
      }

      .body {
        font-size: 11px;
      }

      .alert-title {
        font-size: 11px;
      }

      .alert-summary {
        font-size: 10px;
      }

      .alert-updated {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div class="heading">
        <div class="title">Greater Victoria Alerts</div>
        <div class="subtitle">Environment Canada</div>
      </div>

      <div class="links">
        <a href="https://weather.gc.ca/warnings/report_e.html?bc43=" target="_blank" rel="noopener noreferrer">Official alerts</a>
        <a href="https://weather.gc.ca/en/location/index.html?coords=48.433%2C-123.362" target="_blank" rel="noopener noreferrer">Forecast</a>
      </div>
    </div>

    <div class="badge" id="status">Checking alerts…</div>

    <div class="body" id="body">Loading…</div>
  </div>

  <script>
    const ALERTS_API = "https://victoria-alerts.j-r-moroschan.workers.dev";

    async function loadAlerts() {
      const statusEl = document.getElementById("status");
      const bodyEl = document.getElementById("body");

      try {
        const res = await fetch(ALERTS_API, { cache: "no-store" });
        if (!res.ok) throw new Error("API request failed");

        const data = await res.json();
        if (!data.ok) throw new Error(data.status || "Feed parse failed");

        if (data.noAlerts) {
          statusEl.textContent = "No alerts in effect";
          statusEl.className = "badge ok";
          bodyEl.textContent = "Environment Canada currently shows no alerts in effect for Greater Victoria.";
          return;
        }

        statusEl.textContent = `${data.count} active alert${data.count === 1 ? "" : "s"}`;
        statusEl.className = "badge warn";

        bodyEl.innerHTML = data.alerts.map(alert => `
          <div class="alert-item">
            <div class="alert-title">${escapeHtml(alert.title || "Weather alert")}</div>
            <div class="alert-summary">${escapeHtml(alert.summary || "See official alert for full details.")}</div>
            ${alert.updated ? `<div class="alert-updated">Updated: ${escapeHtml(alert.updated)}</div>` : ""}
          </div>
        `).join("");
      } catch (err) {
        statusEl.textContent = "Could not load alerts feed";
        statusEl.className = "badge warn";
        bodyEl.textContent = "The official feed could not be loaded right now. Use the official alerts button above.";
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    loadAlerts();
    setInterval(loadAlerts, 10 * 60 * 1000);
  </script>
</body>
</html>
